<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0f1a] text-white overflow-x-hidden select-none">

    <header class="fixed top-0 w-full z-50 bg-[#0b0f1a]/90 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="btn-icon">
            <i class="fas fa-bars text-xl text-blue-500"></i>
        </button>
        <h1 class="text-xl font-black italic text-blue-500 tracking-tighter uppercase">ZMT STORE</h1>
        <div class="w-10"></div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#121826] z-[100] transform -translate-x-full transition-transform duration-300 border-r border-blue-500/20 shadow-2xl">
        <div class="p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-10">
                <span class="font-black text-blue-500 italic uppercase">ZMT Navigation</span>
                <button onclick="toggleSidebar()" class="text-gray-500"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <nav class="flex-1 space-y-3">
                <button onclick="switchPage('home')" class="nav-btn"><i class="fas fa-store w-8"></i> Toko Utama</button>
                <button onclick="switchPage('event')" class="nav-btn"><i class="fas fa-gift w-8 text-purple-500"></i> Event Gratis</button>
                <a href="#" id="cs_link" target="_blank" class="nav-btn text-green-500"><i class="fab fa-whatsapp w-8"></i> Customer Service</a>
            </nav>
            <button onclick="openAdmin()" class="p-4 bg-red-500/10 text-red-500 rounded-2xl font-bold border border-red-500/20 active:scale-95 transition">
                <i class="fas fa-lock mr-2"></i> ADMIN PANEL
            </button>
        </div>
    </div>

    <main class="pt-24 pb-20 px-4 max-w-lg mx-auto">
        <div class="text-center mb-10">
            <div class="inline-block p-2 bg-white rounded-3xl shadow-xl mb-4">
                <img src="qris_clean.png" class="w-44 h-44 object-contain rounded-2xl">
            </div>
            <p class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Scan To Pay ZMT</p>
        </div>

        <div id="page_home" class="space-y-6"></div>
        <div id="page_event" class="hidden text-center space-y-4">
            <h2 class="text-xl font-black text-purple-500 italic">EVENT & DOWNLOAD</h2>
            <div id="event_list" class="space-y-3"></div>
        </div>
    </main>

    <div id="modal_admin" class="fixed inset-0 bg-black/95 z-[2000] hidden flex items-center justify-center p-4">
        <div class="bg-[#121826] w-full max-w-md rounded-[2.5rem] p-6 border border-blue-500/20 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black text-blue-500 italic uppercase">Dashboard Admin</h2>
                <button onclick="closeAdmin()" class="text-gray-500"><i class="fas fa-times text-2xl"></i></button>
            </div>

            <div class="space-y-4">
                <input type="text" id="p_name" placeholder="Nama Produk" class="admin-input">
                
                <select id="p_tag" class="admin-input text-gray-400">
                    <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>

                <div class="bg-black/20 p-4 rounded-2xl border border-white/5 space-y-2">
                    <p class="text-[10px] font-bold text-blue-500 uppercase mb-2">Input Harga (Maks 5)</p>
                    <div class="grid grid-cols-2 gap-2" id="price_rows">
                        <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                        <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                        <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                        <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                        <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                    </div>
                </div>

                <button onclick="saveProduct()" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase active:scale-95 transition">Upload Produk</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
