<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMT STORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0f1a] text-white">

    <button onclick="toggleSidebar()" class="fixed top-5 left-5 z-[100] bg-blue-600/20 p-3 rounded-xl border border-blue-500/50 hover:bg-blue-600 transition-all">
        <i class="fas fa-bars text-2xl text-blue-400"></i>
    </button>

    <div id="sidebar" class="fixed top-0 left-0 h-full w-72 bg-[#121826] border-r border-blue-500/20 z-[1000] transform -translate-x-full transition-transform duration-300 ease-in-out shadow-2xl">
        <div class="p-6">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic text-blue-500">ZMT MENU</h2>
                <button onclick="toggleSidebar()"><i class="fas fa-times text-2xl text-gray-400"></i></button>
            </div>
            
            <nav class="space-y-4">
                <a href="#" onclick="switchPage('home')" class="nav-item"><i class="fas fa-home w-8"></i> Home</a>
                <a href="#" onclick="switchPage('event')" class="nav-item"><i class="fas fa-gift w-8"></i> Event Gratis</a>
                <a href="#" id="cs_link" target="_blank" class="nav-item text-green-400"><i class="fab fa-whatsapp w-8"></i> Customer Service</a>
                
                <div class="pt-6 border-t border-gray-800">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-4">Social Media</p>
                    <div id="sosmed_container" class="space-y-3"></div>
                </div>

                <div class="pt-6 border-t border-gray-800">
                    <button onclick="openAdmin()" class="w-full text-left p-3 rounded-lg hover:bg-red-500/10 text-red-500 transition">
                        <i class="fas fa-lock w-8"></i> Dashboard Admin
                    </button>
                </div>
            </nav>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4 pt-20 pb-20">
        <header class="text-center mb-12">
            <h1 class="text-6xl font-black italic tracking-tighter text-blue-600 mb-6 uppercase">ZMT STORE</h1>
            <div class="inline-block p-3 bg-white rounded-3xl shadow-[0_0_50px_rgba(37,99,235,0.3)]">
                <img src="qris_clean.png" alt="QRIS" class="w-48 h-48 object-contain">
            </div>
            <p class="mt-4 text-gray-500 font-bold tracking-widest uppercase text-xs">Scan for Payment</p>
        </header>

        <div id="page_home" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        <div id="page_event" class="hidden space-y-4"></div>
    </div>

    <div id="modal_admin" class="fixed inset-0 bg-black/90 z-[10000] hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-[#121826] w-full max-w-4xl rounded-3xl p-8 border border-blue-500/30 relative">
            <button onclick="closeAdmin()" class="absolute top-6 right-6 text-2xl text-gray-500"><i class="fas fa-times"></i></button>
            <h2 class="text-3xl font-black italic text-blue-500 mb-8">ADMIN PANEL</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <h3 class="font-bold border-b border-gray-800 pb-2">Produk Baru</h3>
                    <input type="text" id="p_name" placeholder="Nama Produk" class="admin-input">
                    <select id="p_tag" class="admin-input">
                        <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                        <option value="NO ROOT">NO ROOT</option>
                    </select>
                    <textarea id="p_prices" placeholder="1 Day | 10K, 7 Day | 50K" class="admin-input h-24"></textarea>
                    <button onclick="addProduct()" class="w-full bg-blue-600 p-3 rounded-xl font-bold uppercase tracking-widest">Simpan Produk</button>
                </div>

                <div class="space-y-4">
                    <h3 class="font-bold border-b border-gray-800 pb-2">Link & Sosmed</h3>
                    <input type="text" id="set_wa1" placeholder="Nomor WA 1 (628...)" class="admin-input">
                    <input type="text" id="set_wa2" placeholder="Nomor WA 2 (628...)" class="admin-input">
                    <input type="text" id="set_cs" placeholder="Link Group CS" class="admin-input">
                    <hr class="border-gray-800">
                    <div class="flex gap-2">
                        <input type="text" id="sm_name" placeholder="Tiktok" class="admin-input">
                        <input type="text" id="sm_icon" placeholder="fa-brands fa-tiktok" class="admin-input">
                    </div>
                    <input type="text" id="sm_link" placeholder="Link Sosmed" class="admin-input">
                    <button onclick="addSosmed()" class="w-full bg-purple-600 p-3 rounded-xl font-bold uppercase tracking-widest">Tambah Sosmed</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
