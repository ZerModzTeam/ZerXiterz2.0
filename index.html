<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE - VVIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="stars-wrapper" id="starField"></div>

    <header class="main-header">
        <button onclick="toggleSidebar()" class="burger-btn">
            <i class="fas fa-bars-staggered"></i>
        </button>
        <h1 class="logo">ZMT STORE</h1>
        <div id="admin_tag" class="admin-icon hidden"><i class="fas fa-user-shield"></i></div>
        <div class="spacer"></div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-top">
                <span class="nav-title">NAVIGATOR</span>
                <button onclick="toggleSidebar()" class="close-sidebar"><i class="fas fa-times"></i></button>
            </div>
            
            <nav class="menu-list">
                <button onclick="switchPage('home')" class="menu-item active">
                    <i class="fas fa-home"></i> <span>Toko Utama</span>
                </button>
                <button onclick="switchPage('event')" class="menu-item">
                    <i class="fas fa-bolt"></i> <span>Event Gratis</span>
                </button>
                <a href="https://wa.me/6289653938936" class="menu-item">
                    <i class="fab fa-whatsapp"></i> <span>Customer Service</span>
                </a>
            </nav>

            <div class="sidebar-bottom">
                <button id="lgn_btn" onclick="openAdmin()" class="auth-btn login">LOGIN ADMIN</button>
                <button id="lgt_btn" onclick="logoutAdmin()" class="auth-btn logout hidden">LOGOUT AKUN</button>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="qris-section">
            <div onclick="zoomQR()" class="qris-card">
                <img src="qris_clean.png" alt="QRIS" class="qris-img">
            </div>
            <h2 class="qris-text">CLICK TO PAYMENT</h2>
            <p class="qris-subtext">DIGITAL PAYMENT ZMT</p>
        </div>

        <button onclick="showRules()" class="rules-btn">
            <i class="fas fa-scroll"></i> RULES PAYMENT
        </button>

        <div id="page_home" class="product-container">
            </div>

        <div id="page_event" class="event-empty hidden">
            BELUM ADA EVENT LEK...
        </div>
    </main>

    <div id="modal_admin" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>ADMIN CONSOLE</h3>
                <button onclick="closeAdmin()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="admin-form">
                <div class="row-input">
                    <input type="text" id="p_name" placeholder="Nama Produk" class="capsule-in">
                    <select id="p_tag" class="capsule-in">
                        <option value="ROOT/VIRTUAL">ROOT</option>
                        <option value="NO ROOT">NO ROOT</option>
                    </select>
                </div>

                <div class="price-list" id="price_fields">
                    <div class="row-input">
                        <input type="text" placeholder="Durasi" class="capsule-in d-in">
                        <input type="text" placeholder="Harga" class="capsule-in p-in">
                    </div>
                    <div class="row-input">
                        <input type="text" placeholder="Durasi" class="capsule-in d-in">
                        <input type="text" placeholder="Harga" class="capsule-in p-in">
                    </div>
                </div>

                <button onclick="saveP()" class="upload-btn">UPLOAD PRODUK</button>
                
                <div id="admin_list" class="manage-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
