<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE V3.6 - FIX DASHBOARD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: white; overflow-x: hidden; }

        #starField { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: moveStars linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        .main-header { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-style: italic; color: #3b82f6; font-weight: 900; font-size: 22px; }
        .burger-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #3b82f633; background: #3b82f61a; color: #3b82f6; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .sidebar { position: fixed; top: 0; left: 0; width: 290px; height: 100%; background: rgba(8, 11, 18, 0.98); backdrop-filter: blur(25px); z-index: 1000; transition: 0.5s; transform: translateX(-100%); border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-content { padding: 35px; display: flex; flex-direction: column; height: 100%; }
        .nav-item { display: flex; align-items: center; gap: 15px; width: 100%; padding: 16px 25px; border-radius: 50px; background: rgba(255,255,255,0.03); color: #94a3b8; font-weight: 700; margin-bottom: 12px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .nav-item.active { background: #3b82f626; color: #3b82f6; border-color: #3b82f64d; }

        .container { padding: 110px 20px 60px; max-width: 480px; margin: 0 auto; position: relative; z-index: 10; }
        
        .search-container { position: relative; margin-bottom: 25px; }
        .search-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 18px 25px 18px 55px; color: white; font-family: inherit; font-weight: 700; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .search-icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: #3b82f6; }

        .qris-frame { display: block; margin: 0 auto; padding: 12px; background: white; border-radius: 40px; width: fit-content; cursor: pointer; }
        .qris-img { width: 190px; height: 190px; border-radius: 30px; display: block; }
        .rules-btn { width: 100%; padding: 18px; border-radius: 50px; background: #ef44441a; border: 1px solid #ef444433; color: #ef4444; font-weight: 900; margin: 25px 0; cursor: pointer; }

        .p-card { background: rgba(15, 23, 42, 0.6); border-radius: 50px; padding: 35px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .p-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
        .p-name { font-size: 26px; font-style: italic; font-weight: 900; text-transform: uppercase; line-height: 1.1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; flex: 1; }
        .p-tag { color: #3b82f6; font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; background: #3b82f61a; padding: 5px 12px; border-radius: 20px; border: 1px solid #3b82f633; white-space: nowrap; }
        
        .price-box { background: rgba(255,255,255,0.03); border-radius: 40px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; text-align: center; }
        .buy-btn { width: 100%; padding: 12px; border-radius: 50px; border: none; color: white; font-weight: 800; font-size: 11px; margin-top: 5px; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal-card { background: #0f172a; width: 100%; max-width: 450px; border-radius: 50px; padding: 35px; border: 1px solid #3b82f633; overflow-y: auto; max-height: 90vh; }
        .cap-in { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 15px 20px; color: white; font-size: 13px; outline: none; width: 100%; margin-bottom: 10px; }
        .row-in { display: flex; gap: 10px; }
        .up-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 30px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .hidden { display: none !important; }

        .photo-rules { text-align: left; }
        .photo-rules .title { font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .photo-rules .hangus { background: #4b5563; padding: 8px 15px; color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 20px; display: inline-block; }
        .photo-rules ul { list-style: disc; padding-left: 20px; }
        .photo-rules li { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 10px; font-style: italic; }
    </style>
</head>
<body>

    <div id="starField"></div>

    <header class="main-header">
        <button onclick="toggleSidebar()" class="burger-btn"><i class="fas fa-bars-staggered"></i></button>
        <h1 class="logo">ZMT STORE</h1>
        <div id="adm_tag" class="hidden" style="color:#ef4444; font-size:20px"><i class="fas fa-user-shield"></i></div>
        <div style="width:45px"></div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:40px">
                <span style="font-size:10px; letter-spacing:3px; color:#3b82f6; font-weight:800">MENU</span>
                <i onclick="toggleSidebar()" class="fas fa-times" style="cursor:pointer"></i>
            </div>
            <nav>
                <div onclick="switchPage('home')" class="nav-item active" id="nav_home"><i class="fas fa-home"></i> Home</div>
                <div onclick="switchPage('event')" class="nav-item" id="nav_event"><i class="fas fa-bolt"></i> Event Gratis</div>
                <a href="https://chat.whatsapp.com/JBW6fNk5KwiGRWCaPVmr8T" target="_blank" class="nav-item" style="text-decoration:none">
                    <i class="fab fa-whatsapp"></i> CUSTOMER SERVICE
                </a>
                <div id="dash_nav" onclick="openAdmin()" class="nav-item hidden" style="color:#fbbf24!important"><i class="fas fa-tools"></i> Dashboard Admin</div>
            </nav>
            <div style="margin-top:auto">
                <button id="lgn_btn" onclick="openAdmin()" class="nav-item" style="border:none; width:100%; background:#3b82f61a; color:#3b82f6">LOGIN ADMIN</button>
                <button id="lgt_btn" onclick="logout()" class="nav-item hidden" style="background:#ef44441a; color:#ef4444; border:none; width:100%">LOGOUT</button>
            </div>
        </div>
    </div>

    <main class="container">
        <div id="page_home">
            <div class="qris-frame" onclick="zoomQR()">
                <img src="qris_clean.png" class="qris-img" onerror="this.src='https://via.placeholder.com/200?text=QRIS'">
            </div>
            <p style="text-align:center; font-size:10px; color:#3b82f6; margin-top:10px; font-weight:800; letter-spacing:1px; margin-bottom: 20px;">
                <i class="fas fa-search-plus"></i> KLIK GAMBAR UNTUK ZOOM
            </p>
            
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari nama cheat..." onkeyup="filterProducts()">
            </div>

            <button onclick="showRules()" class="rules-btn">RULES TF</button>
            <div id="product_list"></div>
        </div>

        <div id="page_event" class="hidden">
            <h2 style="text-align:center; margin-bottom:30px; font-style:italic; color:#3b82f6">EVENT UPDATE</h2>
            <div id="event_list"></div>
        </div>
    </main>

    <div id="modal_adm" class="modal">
        <div class="modal-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:25px; color:#3b82f6; font-weight:800">
                <span id="form_title">DASHBOARD ADMIN</span>
                <i onclick="closeAdmin()" class="fas fa-times" style="cursor:pointer"></i>
            </div>
            
            <p style="font-size:10px; color:#3b82f6; margin-bottom:10px">UPLOAD PRODUK</p>
            <input type="hidden" id="edit_id">
            <div class="row-in">
                <input type="text" id="p_name" placeholder="Nama Cheat" class="cap-in">
                <select id="p_tag" class="cap-in" style="flex:0.7">
                    <option value="ROOT / VIRTUAL">ROOT / VIRTUAL</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>
            </div>
            <div id="price_rows">
                <div class="row-in"><input type="number" placeholder="Hari" class="cap-in d-in"><input type="number" placeholder="K" class="cap-in p-in"></div>
                <div class="row-in"><input type="number" placeholder="Hari" class="cap-in d-in"><input type="number" placeholder="K" class="cap-in p-in"></div>
                <div class="row-in"><input type="number" placeholder="Hari" class="cap-in d-in"><input type="number" placeholder="K" class="cap-in p-in"></div>
            </div>
            <button onclick="saveP()" id="save_p_btn" class="up-btn">UPLOAD PRODUK</button>

            <hr style="margin:30px 0; border:none; border-top:1px solid #222">
            
            <p style="font-size:10px; color:#10b981; margin-bottom:10px">SETTING EVENT GRATIS</p>
            <input type="hidden" id="ev_edit_id">
            <input type="text" id="ev_title" placeholder="Judul Event" class="cap-in">
            <input type="text" id="ev_link" placeholder="Link (https://...)" class="cap-in">
            <button onclick="saveEv()" id="save_ev_btn" class="up-btn" style="background:#10b981">UPDATE EVENT</button>

            <div id="manage_list_p" style="margin-top:30px"></div>
            <div id="manage_list_ev" style="margin-top:20px"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDCOuLRN2VNULW1T2P-43GkXBUqpCHqQSY",
            databaseURL: "https://zmtstore-92963-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = localStorage.getItem('zmt_v36') === 'true';

        // Stars Background
        const field = document.getElementById('starField');
        for(let i=0; i<80; i++) {
            let s = document.createElement('div');
            s.className='star'; s.style.width=s.style.height=Math.random()*3+'px';
            s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
            s.style.animationDuration=(Math.random()*50+50)+'s';
            field.appendChild(s);
        }

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
        window.closeAdmin = () => { document.getElementById('modal_adm').classList.remove('active'); resetForm(); };
        window.switchPage = (p) => {
            document.getElementById('page_home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page_event').classList.toggle('hidden', p !== 'event');
            document.getElementById('nav_home').classList.toggle('active', p === 'home');
            document.getElementById('nav_event').classList.toggle('active', p === 'event');
            toggleSidebar();
        };

        window.filterProducts = () => {
            const input = document.getElementById('searchInput').value.toUpperCase();
            const cards = document.getElementsByClassName('p-card');
            for (let i = 0; i < cards.length; i++) {
                const name = cards[i].getElementsByClassName('p-name')[0];
                if (name) cards[i].style.display = name.innerText.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        };

        if(isAdmin) {
            document.getElementById('adm_tag').classList.remove('hidden');
            document.getElementById('dash_nav').classList.remove('hidden');
            document.getElementById('lgt_btn').classList.remove('hidden');
            document.getElementById('lgn_btn').classList.add('hidden');
        }

        window.openAdmin = async () => {
            if(isAdmin) return document.getElementById('modal_adm').classList.add('active');
            const { value: v } = await Swal.fire({
                title: 'ADMIN LOGIN', background: '#0f172a', color: '#fff',
                html: '<input id="u" class="swal2-input" placeholder="User"><input id="p" type="password" class="swal2-input" placeholder="Pass">',
                preConfirm: () => [document.getElementById('u').value, document.getElementById('p').value]
            });
            if(v && v[0]==='Zmt' && v[1]==='zmt') { localStorage.setItem('zmt_v36', 'true'); location.reload(); }
        };

        window.logout = () => { localStorage.removeItem('zmt_v36'); location.reload(); };

        // Product Logic
        window.saveP = () => {
            const id = document.getElementById('edit_id').value;
            const name = document.getElementById('p_name').value;
            const tag = document.getElementById('p_tag').value;
            const durs = document.querySelectorAll('.d-in'), prcs = document.querySelectorAll('.p-in');
            let prices = [];
            durs.forEach((d, i) => { if(d.value) prices.push(`${d.value} Day | ${prcs[i].value}K`); });
            if(!name || prices.length === 0) return;
            const data = { name, tag, prices: prices.join(',') };
            if(id) db.ref('products/'+id).update(data); else db.ref('products').push(data);
            Swal.fire('Success!', '', 'success'); closeAdmin();
        };

        window.editP = (id, name, tag, prices) => {
            resetForm(); document.getElementById('edit_id').value = id;
            document.getElementById('p_name').value = name; document.getElementById('p_tag').value = tag;
            const pArr = prices.split(','), durs = document.querySelectorAll('.d-in'), prcs = document.querySelectorAll('.p-in');
            pArr.forEach((p, i) => { if(durs[i]) { const part = p.split(' Day | '); durs[i].value = part[0]; prcs[i].value = part[1].replace('K',''); } });
            document.getElementById('save_p_btn').innerText = "UPDATE PRODUK";
        };

        // Event Logic
        window.saveEv = () => {
            const id = document.getElementById('ev_edit_id').value;
            const title = document.getElementById('ev_title').value, link = document.getElementById('ev_link').value;
            if(!title || !link) return;
            if(id) db.ref('events/'+id).update({title, link}); else db.ref('events').push({title, link});
            resetForm(); Swal.fire('Event Saved!', '', 'success');
        };

        window.editEv = (id, title, link) => {
            document.getElementById('ev_edit_id').value = id;
            document.getElementById('ev_title').value = title; document.getElementById('ev_link').value = link;
            document.getElementById('save_ev_btn').innerText = "UPDATE EVENT";
        };

        function resetForm() {
            document.getElementById('edit_id').value = ""; document.getElementById('ev_edit_id').value = "";
            document.getElementById('p_name').value = ""; document.getElementById('ev_title').value = "";
            document.getElementById('ev_link').value = ""; document.querySelectorAll('.d-in, .p-in').forEach(i => i.value = "");
            document.getElementById('save_p_btn').innerText = "UPLOAD PRODUK"; document.getElementById('save_ev_btn').innerText = "UPDATE EVENT";
        }

        // Database Sync
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product_list'), mList = document.getElementById('manage_list_p');
            list.innerHTML = ''; mList.innerHTML = '';
            snap.forEach(child => {
                const item = child.val(); let p_html = '';
                item.prices.split(',').forEach(p => {
                    p_html += `<div class="price-box"><span style="font-weight:900; color:#3b82f6; font-size:18px">${p}</span>
                        <div style="display:flex; gap:10px; margin-top:10px;"><button onclick="window.open('https://wa.me/6289653938936?text=Order%20${item.name}%20${p}')" class="buy-btn" style="background:#2563eb">WA 1</button>
                        <button onclick="window.open('https://wa.me/6285721057014?text=Order%20${item.name}%20${p}')" class="buy-btn" style="background:#10b981">WA 2</button></div></div>`;
                });
                list.innerHTML += `<div class="p-card"><div class="p-header"><h1 class="p-name">${item.name}</h1><span class="p-tag">${item.tag}</span></div>${p_html}</div>`;
                if(isAdmin) mList.innerHTML += `<div class="manage-item"><span>${item.name}</span><div style="display:flex; gap:10px"><i onclick="editP('${child.key}','${item.name}','${item.tag}','${item.prices}')" class="fas fa-edit" style="color:#fbbf24; cursor:pointer"></i><i onclick="db.ref('products/${child.key}').remove()" class="fas fa-trash" style="color:#ef4444; cursor:pointer"></i></div></div>`;
            });
        });

        db.ref('events').on('value', snap => {
            const evPage = document.getElementById('event_list'), mEvList = document.getElementById('manage_list_ev');
            evPage.innerHTML = ''; mEvList.innerHTML = '';
            snap.forEach(child => {
                const ev = child.val();
                evPage.innerHTML += `<div onclick="window.open('${ev.link}')" class="p-card" style="text-align:center; cursor:pointer; background:rgba(16,185,129,0.1); border-color:#10b98133;"><h2 style="color:#10b981; font-style:italic;">${ev.title}</h2><p style="font-size:10px; margin-top:10px; opacity:0.5;">CLICK TO OPEN LINK</p></div>`;
                if(isAdmin) mEvList.innerHTML += `<div class="manage-item" style="border-color:#10b98133"><span>EV: ${ev.title}</span><div style="display:flex; gap:10px"><i onclick="editEv('${child.key}','${ev.title}','${ev.link}')" class="fas fa-edit" style="color:#fbbf24; cursor:pointer"></i><i onclick="db.ref('events/${child.key}').remove
