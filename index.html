<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE V3 - PRO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #05070a; color: white; overflow-x: hidden; }

        #starField { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: moveStars linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-1000px); } }

        .main-header { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.7); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-style: italic; color: #3b82f6; font-weight: 900; font-size: 22px; }
        .burger-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #3b82f633; background: #3b82f61a; color: #3b82f6; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .sidebar { position: fixed; top: 0; left: 0; width: 290px; height: 100%; background: rgba(8, 11, 18, 0.98); backdrop-filter: blur(25px); z-index: 1000; transition: 0.5s; transform: translateX(-100%); border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-content { padding: 35px; display: flex; flex-direction: column; height: 100%; }
        .nav-item { display: flex; align-items: center; gap: 15px; width: 100%; padding: 16px 25px; border-radius: 50px; background: rgba(255,255,255,0.03); color: #94a3b8; font-weight: 700; margin-bottom: 12px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .nav-item.active { background: #3b82f626; color: #3b82f6; border-color: #3b82f64d; }

        .container { padding: 110px 20px 60px; max-width: 480px; margin: 0 auto; position: relative; z-index: 10; }
        .qris-frame { display: block; margin: 0 auto; padding: 12px; background: white; border-radius: 40px; width: fit-content; }
        .qris-img { width: 190px; height: 190px; border-radius: 30px; display: block; }
        .rules-btn { width: 100%; padding: 18px; border-radius: 50px; background: #ef44441a; border: 1px solid #ef444433; color: #ef4444; font-weight: 900; margin: 30px 0; cursor: pointer; }

        .p-card { background: rgba(15, 23, 42, 0.6); border-radius: 50px; padding: 35px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        .p-name { font-size: 28px; font-style: italic; font-weight: 900; text-transform: uppercase; line-height: 1; margin: 10px 0 20px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
        .price-box { background: rgba(255,255,255,0.03); border-radius: 40px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; text-align: center; }
        .buy-btn { width: 100%; padding: 12px; border-radius: 50px; border: none; color: white; font-weight: 800; font-size: 11px; margin-top: 5px; cursor: pointer; }

        /* Modal Admin */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .modal-card { background: #0f172a; width: 100%; max-width: 450px; border-radius: 50px; padding: 35px; border: 1px solid #3b82f633; overflow-y: auto; max-height: 90vh; }
        .cap-in { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; padding: 15px 20px; color: white; font-size: 13px; outline: none; width: 100%; margin-bottom: 10px; }
        .row-in { display: flex; gap: 10px; }
        .up-btn { width: 100%; background: #2563eb; color: white; border: none; padding: 18px; border-radius: 50px; font-weight: 900; margin-top: 15px; cursor: pointer; }
        
        .manage-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 15px 20px; border-radius: 30px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .action-btns { display: flex; gap: 15px; }
        .action-btns i { cursor: pointer; font-size: 16px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="starField"></div>

    <header class="main-header">
        <button onclick="toggleSidebar()" class="burger-btn"><i class="fas fa-bars-staggered"></i></button>
        <h1 class="logo">ZMT STORE</h1>
        <div id="adm_tag" class="hidden" style="color:#ef4444; font-size:20px"><i class="fas fa-user-shield"></i></div>
        <div style="width:45px"></div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:40px">
                <span style="font-size:10px; letter-spacing:3px; color:#3b82f6; font-weight:800">MENU</span>
                <i onclick="toggleSidebar()" class="fas fa-times" style="cursor:pointer"></i>
            </div>
            <nav>
                <div onclick="switchPage('home')" class="nav-item active" id="nav_home"><i class="fas fa-home"></i> Home</div>
                <div onclick="switchPage('event')" class="nav-item" id="nav_event"><i class="fas fa-bolt"></i> Event</div>
                <div id="dash_nav" onclick="openAdmin()" class="nav-item hidden" style="color:#fbbf24!important"><i class="fas fa-tools"></i> Admin Dashboard</div>
            </nav>
            <div style="margin-top:auto">
                <button id="lgn_btn" onclick="openAdmin()" class="nav-item" style="border:none; width:100%">LOGIN ADMIN</button>
                <button id="lgt_btn" onclick="logout()" class="nav-item hidden" style="background:#ef44441a; color:#ef4444; border:none; width:100%">LOGOUT</button>
            </div>
        </div>
    </div>

    <main class="container">
        <div id="page_home">
            <div class="qris-frame" onclick="zoomQR()"><img src="qris_clean.png" class="qris-img"></div>
            <button onclick="showRules()" class="rules-btn">RULES PAYMENT</button>
            <div id="product_list"></div>
        </div>

        <div id="page_event" class="hidden">
            <h2 style="text-align:center; margin-bottom:30px; font-style:italic">EVENT GRATISAN</h2>
            <div id="event_list"></div>
        </div>
    </main>

    <div id="modal_adm" class="modal">
        <div class="modal-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:25px; color:#3b82f6; font-weight:800">
                <span id="form_title">DASHBOARD V3</span>
                <i onclick="closeAdmin()" class="fas fa-times" style="cursor:pointer"></i>
            </div>
            
            <input type="hidden" id="edit_id">
            <p style="font-size:10px; margin-bottom:10px; color:#666">PRODUK CHEAT</p>
            <div class="row-in">
                <input type="text" id="p_name" placeholder="Nama Cheat" class="cap-in">
                <select id="p_tag" class="cap-in" style="flex:0.5">
                    <option value="ROOT">ROOT</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>
            </div>
            <div id="price_rows">
                <div class="row-in"><input type="number" placeholder="Durasi" class="cap-in d-in"><input type="number" placeholder="Harga" class="cap-in p-in"></div>
                <div class="row-in"><input type="number" placeholder="Durasi" class="cap-in d-in"><input type="number" placeholder="Harga" class="cap-in p-in"></div>
                <div class="row-in"><input type="number" placeholder="Durasi" class="cap-in d-in"><input type="number" placeholder="Harga" class="cap-in p-in"></div>
                <div class="row-in"><input type="number" placeholder="Durasi" class="cap-in d-in"><input type="number" placeholder="Harga" class="cap-in p-in"></div>
                <div class="row-in"><input type="number" placeholder="Durasi" class="cap-in d-in"><input type="number" placeholder="Harga" class="cap-in p-in"></div>
            </div>
            <button onclick="saveP()" id="save_p_btn" class="up-btn">UPLOAD PRODUK</button>

            <div style="margin-top:40px; border-top:1px solid #222; padding-top:20px">
                <p style="font-size:10px; margin-bottom:10px; color:#666">EVENT GRATISAN (JUDUL & LINK)</p>
                <input type="hidden" id="event_edit_id">
                <input type="text" id="ev_title" placeholder="Judul Event" class="cap-in">
                <input type="text" id="ev_link" placeholder="URL Link (https://...)" class="cap-in">
                <button onclick="saveEvent()" id="save_ev_btn" class="up-btn" style="background:#10b981">SIMPAN EVENT</button>
            </div>

            <p style="margin-top:30px; font-size:10px; color:#666">MANAGE DATA</p>
            <div id="manage_list_p"></div>
            <div id="manage_list_ev" style="margin-top:15px"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDCOuLRN2VNULW1T2P-43GkXBUqpCHqQSY",
            databaseURL: "https://zmtstore-92963-default-rtdb.asia-southeast1.firebasedatabase.app",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isAdmin = localStorage.getItem('zmt_v3') === 'true';

        // Star BG
        const field = document.getElementById('starField');
        for(let i=0; i<80; i++) {
            let s = document.createElement('div');
            s.className='star'; s.style.width=s.style.height=Math.random()*3+'px';
            s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
            s.style.animationDuration=(Math.random()*50+50)+'s';
            field.appendChild(s);
        }

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('active');
        window.closeAdmin = () => {
            document.getElementById('modal_adm').classList.remove('active');
            resetForm();
        };

        window.switchPage = (p) => {
            document.getElementById('page_home').classList.toggle('hidden', p !== 'home');
            document.getElementById('page_event').classList.toggle('hidden', p !== 'event');
            document.getElementById('nav_home').classList.toggle('active', p === 'home');
            document.getElementById('nav_event').classList.toggle('active', p === 'event');
            toggleSidebar();
        };

        if(isAdmin) {
            document.getElementById('adm_tag').classList.remove('hidden');
            document.getElementById('dash_nav').classList.remove('hidden');
            document.getElementById('lgt_btn').classList.remove('hidden');
            document.getElementById('lgn_btn').classList.add('hidden');
        }

        window.openAdmin = async () => {
            if(isAdmin) return document.getElementById('modal_adm').classList.add('active');
            const { value: formValues } = await Swal.fire({
                title: 'ADMIN LOGIN', background: '#0f172a', color: '#fff',
                html: '<input id="u" class="swal2-input" placeholder="User"><input id="p" type="password" class="swal2-input" placeholder="Pass">',
                preConfirm: () => [document.getElementById('u').value, document.getElementById('p').value]
            });
            if(formValues && formValues[0]==='Zmt' && formValues[1]==='zmt') {
                localStorage.setItem('zmt_v3', 'true'); location.reload();
            }
        };

        window.logout = () => { localStorage.removeItem('zmt_v3'); location.reload(); };

        // --- ENGINE PRODUK ---
        window.saveP = () => {
            const id = document.getElementById('edit_id').value;
            const name = document.getElementById('p_name').value;
            const tag = document.getElementById('p_tag').value;
            const durs = document.querySelectorAll('.d-in');
            const prcs = document.querySelectorAll('.p-in');
            let prices = [];
            durs.forEach((d, i) => { if(d.value) prices.push(`${d.value} Day | ${prcs[i].value}K`); });

            if(!name || prices.length === 0) return Swal.fire('Error', 'Data belum lengkap lek!', 'error');

            const data = { name, tag, prices: prices.join(',') };
            if(id) db.ref('products/'+id).update(data);
            else db.ref('products').push(data);
            
            Swal.fire('Berhasil!', '', 'success');
            resetForm();
        };

        window.editP = (id, name, tag, prices) => {
            document.getElementById('edit_id').value = id;
            document.getElementById('p_name').value = name;
            document.getElementById('p_tag').value = tag;
            const pArr = prices.split(',');
            const durs = document.querySelectorAll('.d-in');
            const prcs = document.querySelectorAll('.p-in');
            pArr.forEach((p, i) => {
                const part = p.split(' Day | ');
                durs[i].value = part[0];
                prcs[i].value = part[1].replace('K','');
            });
            document.getElementById('save_p_btn').innerText = "UPDATE PRODUK";
            document.getElementById('form_title').innerText = "EDIT CHEAT";
        };

        // --- ENGINE EVENT ---
        window.saveEvent = () => {
            const id = document.getElementById('event_edit_id').value;
            const title = document.getElementById('ev_title').value;
            const link = document.getElementById('ev_link').value;
            if(!title || !link) return Swal.fire('Lengkapi Link!', '', 'warning');
            
            const data = { title, link };
            if(id) db.ref('events/'+id).update(data);
            else db.ref('events').push(data);
            
            resetForm();
            Swal.fire('Event Tersimpan!', '', 'success');
        };

        window.editEv = (id, title, link) => {
            document.getElementById('event_edit_id').value = id;
            document.getElementById('ev_title').value = title;
            document.getElementById('ev_link').value = link;
            document.getElementById('save_ev_btn').innerText = "UPDATE EVENT";
        };

        function resetForm() {
            document.getElementById('edit_id').value = "";
            document.getElementById('event_edit_id').value = "";
            document.getElementById('p_name').value = "";
            document.getElementById('ev_title').value = "";
            document.getElementById('ev_link').value = "";
            document.querySelectorAll('.d-in, .p-in').forEach(i => i.value = "");
            document.getElementById('save_p_btn').innerText = "UPLOAD PRODUK";
            document.getElementById('save_ev_btn').innerText = "SIMPAN EVENT";
            document.getElementById('form_title').innerText = "DASHBOARD V3";
        }

        // --- REALTIME LISTENER ---
        db.ref('products').on('value', snap => {
            const list = document.getElementById('product_list');
            const mList = document.getElementById('manage_list_p');
            list.innerHTML = ''; mList.innerHTML = '';
            snap.forEach(child => {
                const item = child.val();
                let p_html = '';
                item.prices.split(',').forEach(p => {
                    p_html += `<div class="price-box"><span style="font-weight:900; color:#3b82f6; font-size:18px">${p}</span>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="window.open('https://wa.me/6289653938936?text=Order%20${item.name}%20${p}')" class="buy-btn" style="background:#2563eb">WA 1</button>
                        <button onclick="window.open('https://wa.me/6285721057014?text=Order%20${item.name}%20${p}')" class="buy-btn" style="background:#10b981">WA 2</button>
                        </div></div>`;
                });
                list.innerHTML += `<div class="p-card"><span style="color:#3b82f6; font-size:10px; font-weight:800; letter-spacing:3px">${item.tag}</span><h1 class="p-name">${item.name}</h1>${p_html}</div>`;
                if(isAdmin) mList.innerHTML += `<div class="manage-item"><span>${item.name}</span>
                    <div class="action-btns">
                        <i onclick="editP('${child.key}','${item.name}','${item.tag}','${item.prices}')" class="fas fa-edit" style="color:#fbbf24"></i>
                        <i onclick="db.ref('products/${child.key}').remove()" class="fas fa-trash" style="color:#ef4444"></i>
                    </div></div>`;
            });
        });

        db.ref('events').on('value', snap => {
            const evPage = document.getElementById('event_list');
            const mEvList = document.getElementById('manage_list_ev');
            evPage.innerHTML = ''; mEvList.innerHTML = '';
            snap.forEach(child => {
                const ev = child.val();
                evPage.innerHTML += `<div onclick="window.open('${ev.link}')" class="p-card" style="text-align:center; cursor:pointer; background:rgba(16,185,129,0.1); border-color:#10b98133;">
                    <h2 style="color:#10b981; font-style:italic;">${ev.title}</h2>
                    <p style="font-size:10px; margin-top:10px; color:#fff; opacity:0.5;">CLICK TO OPEN LINK</p>
                </div>`;
                if(isAdmin) mEvList.innerHTML += `<div class="manage-item" style="border-color:#10b98133"><span>EV: ${ev.title}</span>
                    <div class="action-btns">
                        <i onclick="editEv('${child.key}','${ev.title}','${ev.link}')" class="fas fa-edit" style="color:#fbbf24"></i>
                        <i onclick="db.ref('events/${child.key}').remove()" class="fas fa-trash" style="color:#ef4444"></i>
                    </div></div>`;
            });
        });

        window.zoomQR = () => Swal.fire({ imageUrl: 'qris_clean.png', imageWidth: 400, showConfirmButton: false, background: '#0f172a' });
        window.showRules = () => Swal.fire({ title: 'RULES', background: '#0f172a', color: '#fff', html: '1. Scan QRIS<br>2. Bayar Sesuai Harga<br>3. Kirim Bukti ke WA' });
    </script>
</body>
</html>
