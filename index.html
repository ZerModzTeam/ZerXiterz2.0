<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0f1a] text-white">

    <div class="fixed top-0 left-0 w-full p-4 z-[50] bg-[#0b0f1a]/80 backdrop-blur-md">
        <button onclick="toggleSidebar()" class="p-2 w-12 h-12 flex items-center justify-center bg-blue-600 rounded-xl shadow-lg shadow-blue-500/20">
            <i class="fas fa-bars text-xl text-white"></i>
        </button>
    </div>

    <div class="max-w-4xl mx-auto px-4 pt-24 pb-20 relative z-[10]">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter text-blue-600 mb-6">ZMT STORE</h1>
            <div class="inline-block p-2 bg-white rounded-2xl">
                <img src="qris_clean.png" alt="QRIS" class="w-44 h-44 object-contain">
            </div>
        </header>

        <div id="page_home" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <div id="page_event" class="hidden space-y-4"></div>
    </div>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#121826] border-r border-blue-500/30 shadow-[20px_0_50px_rgba(0,0,0,0.8)] transition-all duration-300 transform -translate-x-full z-[99999]">
        <div class="p-6 h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-xl font-bold text-blue-500 tracking-tighter uppercase">ZMT Navigator</h2>
                <button onclick="toggleSidebar()" class="text-gray-400 p-2"><i class="fas fa-times text-2xl"></i></button>
            </div>
            
            <nav class="flex-1 space-y-2">
                <a href="#" onclick="switchPage('home')" class="nav-btn"><i class="fas fa-home w-8"></i> Home</a>
                <a href="#" onclick="switchPage('event')" class="nav-btn"><i class="fas fa-gift w-8"></i> Event</a>
                <a href="#" id="cs_link" target="_blank" class="nav-btn text-green-400"><i class="fab fa-whatsapp w-8"></i> CS WhatsApp</a>
                
                <div class="mt-6 pt-6 border-t border-gray-800">
                    <p class="text-[10px] text-gray-500 uppercase mb-4 tracking-widest">Follow Us</p>
                    <div id="sosmed_container" class="space-y-2"></div>
                </div>
            </nav>

            <button onclick="openAdmin()" class="mt-auto p-4 bg-red-500/10 text-red-500 rounded-2xl font-bold text-sm text-left border border-red-500/20">
                <i class="fas fa-user-shield mr-2"></i> Admin Panel
            </button>
        </div>
    </div>

    <div id="modal_admin" class="fixed inset-0 bg-black/95 z-[100000] hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-[#121826] w-full max-w-2xl rounded-3xl p-6 border border-blue-500/20 relative">
            <button onclick="closeAdmin()" class="absolute top-4 right-4 text-gray-500"><i class="fas fa-times text-xl"></i></button>
            <h2 class="text-2xl font-black text-blue-500 mb-6 uppercase italic">Admin Panel</h2>
            <div class="space-y-4">
                <input type="text" id="p_name" placeholder="Produk Name" class="admin-input">
                <select id="p_tag" class="admin-input">
                    <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>
                <textarea id="p_prices" placeholder="1 Day | 10K, 30 Day | 100K" class="admin-input h-20"></textarea>
                <button onclick="addProduct()" class="w-full bg-blue-600 p-3 rounded-xl font-bold">SAVE PRODUCT</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
