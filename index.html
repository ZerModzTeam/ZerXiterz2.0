<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#05070a] text-[#e2e8f0] overflow-x-hidden">

    <header class="fixed top-0 w-full z-[100] bg-[#05070a]/80 backdrop-blur-2xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="w-12 h-12 flex items-center justify-center bg-blue-500/10 rounded-full border border-blue-500/20 active:scale-90 transition-all">
            <i class="fas fa-bars-staggered text-blue-400"></i>
        </button>
        <h1 class="text-xl font-black italic tracking-tighter text-blue-500 uppercase">ZMT STORE</h1>
        <div id="status_admin" class="hidden"><i class="fas fa-user-shield text-red-500 text-xl"></i></div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#080b12] z-[1000] transform -translate-x-full transition-transform duration-500 border-r border-white/5 shadow-2xl">
        <div class="p-8 flex flex-col h-full">
            <div class="flex justify-between items-center mb-12">
                <span class="text-blue-500 font-black italic uppercase">ZMT Navigator</span>
                <button onclick="toggleSidebar()"><i class="fas fa-times text-2xl text-gray-500"></i></button>
            </div>
            <nav class="flex flex-col space-y-4">
                <button onclick="switchPage('home')" class="nav-item active"><i class="fas fa-home w-8"></i> Toko Utama</button>
                <button onclick="switchPage('event')" class="nav-item"><i class="fas fa-bolt w-8 text-yellow-500"></i> Event Gratis</button>
                <a href="https://wa.me/6289653938936" target="_blank" class="nav-item"><i class="fab fa-whatsapp w-8 text-green-500"></i> CS Service</a>
            </nav>
            <button onclick="openAdmin()" class="mt-auto p-4 bg-red-500/5 border border-red-500/20 rounded-full text-red-500 font-bold active:scale-95 transition-all">
                ADMIN LOGIN
            </button>
        </div>
    </div>

    <main class="pt-28 pb-24 px-6 max-w-md mx-auto">
        <div class="text-center mb-10">
            <div onclick="zoomQR()" class="inline-block p-2 bg-white rounded-[2rem] shadow-2xl cursor-pointer active:scale-95 transition-transform">
                <img src="qris_clean.png" class="w-44 h-44 object-contain rounded-2xl">
            </div>
            <p class="text-[11px] font-bold text-gray-500 mt-4 tracking-widest uppercase italic">Digital Payment ZMT</p>
        </div>

        <div id="page_home" class="space-y-6"></div>
        <div id="page_event" class="hidden space-y-4"></div>
    </main>

    <div id="modal_admin" class="fixed inset-0 bg-black/95 z-[2000] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#0f172a] w-full max-w-md rounded-[2.5rem] p-8 border border-blue-500/20 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black text-blue-500 uppercase italic">Admin Console</h2>
                <button onclick="closeAdmin()"><i class="fas fa-times text-2xl text-gray-500"></i></button>
            </div>

            <div class="flex gap-2 mb-6 bg-black/40 p-1.5 rounded-full border border-white/5">
                <button onclick="tabAdmin('tab_p')" id="btn_tab_p" class="flex-1 py-2.5 text-xs font-bold rounded-full bg-blue-600 transition-all">PRODUK</button>
                <button onclick="tabAdmin('tab_e')" id="btn_tab_e" class="flex-1 py-2.5 text-xs font-bold rounded-full transition-all">EVENT</button>
            </div>

            <div id="tab_p" class="space-y-3">
                <input type="hidden" id="edit_id">
                <input type="text" id="p_name" placeholder="Nama Produk" class="adm-in">
                <select id="p_tag" class="adm-in">
                    <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>
                <div class="grid grid-cols-2 gap-2 mt-2" id="price_area">
                    <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                    <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                    <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                    <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                    <input type="text" placeholder="Durasi" class="row-in d-in"> <input type="text" placeholder="Harga" class="row-in p-in">
                </div>
                <button onclick="saveP()" id="save_btn" class="w-full bg-blue-600 py-4 rounded-full font-black uppercase mt-4 shadow-lg shadow-blue-600/20 active:scale-95 transition-all">Upload Produk</button>
            </div>

            <div id="tab_e" class="hidden space-y-4">
                <input type="text" id="e_title" placeholder="Nama Event" class="adm-in">
                <input type="text" id="e_link" placeholder="Link Download" class="adm-in">
                <button onclick="saveE()" class="w-full bg-purple-600 py-4 rounded-full font-black uppercase">Tambah Event</button>
            </div>
        </div>
    </div>

    <div id="modal_qr" onclick="this.classList.add('hidden')" class="fixed inset-0 bg-black/90 z-[3000] hidden flex items-center justify-center p-8 backdrop-blur-xl animate-in fade-in duration-300">
        <img src="qris_clean.png" class="max-w-full max-h-[80vh] rounded-3xl shadow-2xl border-4 border-white/10">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
