<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZMT STORE | Premium Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white font-sans overflow-x-hidden">

    <div id="sidebar" class="sidebar fixed top-0 left-0 h-full w-72 bg-slate-900 shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 border-r border-blue-500/30">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold italic text-blue-400 tracking-wider">MENU</h2>
                <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <nav class="space-y-2">
                <a href="#" onclick="showSection('store')" class="nav-link"><i class="fas fa-shopping-cart w-8"></i> Store</a>
                <a href="#" onclick="showSection('event')" class="nav-link"><i class="fas fa-gift w-8"></i> Event Gratis</a>
                <a href="#" id="cs_link" target="_blank" class="nav-link text-green-400"><i class="fab fa-whatsapp w-8"></i> Customer Service</a>
                
                <div class="pt-6 border-t border-slate-700 mt-6">
                    <p class="text-xs text-gray-500 uppercase mb-4 tracking-widest">Social Media</p>
                    <div id="sosmed_list" class="space-y-2">
                        </div>
                </div>

                <div class="pt-6 border-t border-slate-700 mt-6">
                    <button onclick="openLogin()" class="w-full text-left p-3 rounded-lg hover:bg-red-500/10 text-red-400 transition">
                        <i class="fas fa-user-shield w-8"></i> Admin Panel
                    </button>
                </div>
            </nav>
        </div>
    </div>

    <main class="min-h-screen p-4 md:p-8">
        <header class="text-center mb-12 relative">
            <button onclick="toggleSidebar()" class="absolute top-0 left-0 text-3xl text-blue-400 hover:scale-110 transition"><i class="fas fa-bars"></i></button>
            
            <h1 class="text-6xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600 mb-6 uppercase">ZMT STORE</h1>
            
            <div class="inline-block p-2 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl shadow-[0_0_30px_rgba(59,130,246,0.5)]">
                <div class="bg-white p-2 rounded-xl">
                    <img src="qris_clean.png" alt="QRIS ZMT" class="w-48 h-auto rounded-lg">
                </div>
            </div>
            <p class="mt-4 text-gray-400 text-sm font-medium tracking-widest uppercase">Scan QRIS for Payment</p>
        </header>

        <section id="store_section" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </section>

        <section id="event_section" class="max-w-4xl mx-auto hidden">
            <h2 class="text-3xl font-bold mb-8 text-center text-purple-400 italic">EVENT & FREE DOWNLOAD</h2>
            <div id="event_list" class="space-y-4">
                </div>
        </section>
    </main>

    <div id="admin_modal" class="fixed inset-0 bg-slate-950/95 z-[100] hidden overflow-y-auto p-4">
        <div class="max-w-4xl mx-auto bg-slate-900 rounded-3xl border border-blue-500/30 p-8 shadow-2xl mt-10 mb-20">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black italic text-blue-400">ADMIN DASHBOARD</h2>
                <button onclick="closeAdmin()" class="bg-slate-800 p-2 rounded-full hover:bg-red-500 transition"><i class="fas fa-times"></i></button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <h3 class="text-lg font-bold border-b border-slate-700 pb-2">Kelola Produk</h3>
                    <input type="text" id="p_name" placeholder="Nama Produk" class="admin-input">
                    <select id="p_tag" class="admin-input">
                        <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                        <option value="NO ROOT">NO ROOT</option>
                    </select>
                    <textarea id="p_prices" placeholder="Durasi | Harga (Contoh: 1 Day | 10K, 7 Day | 50K)" class="admin-input h-24"></textarea>
                    <button onclick="saveProduct()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-xl font-bold transition">TAMBAH PRODUK</button>
                </div>

                <div class="space-y-4">
                    <h3 class="text-lg font-bold border-b border-slate-700 pb-2">Settings & Link</h3>
                    <input type="text" id="set_wa1" placeholder="WhatsApp 1 (628...)" class="admin-input">
                    <input type="text" id="set_wa2" placeholder="WhatsApp 2 (628...)" class="admin-input">
                    <input type="text" id="set_cs" placeholder="Link Group CS" class="admin-input">
                    <button onclick="updateGeneralSettings()" class="w-full bg-green-600 hover:bg-green-500 p-3 rounded-xl font-bold transition mb-6">UPDATE LINKS</button>
                    
                    <h3 class="text-lg font-bold border-b border-slate-700 pb-2">Tambah Sosmed</h3>
                    <div class="flex gap-2">
                        <input type="text" id="sm_name" placeholder="TikTok/YouTube" class="admin-input">
                        <input type="text" id="sm_icon" placeholder="fa-brands fa-tiktok" class="admin-input w-1/3">
                    </div>
                    <input type="text" id="sm_link" placeholder="URL Link" class="admin-input">
                    <button onclick="addSosmed()" class="w-full bg-purple-600 hover:bg-purple-500 p-3 rounded-xl font-bold transition">TAMBAH SOSMED</button>
                </div>
            </div>
            
            <div class="mt-10 pt-10 border-t border-slate-800">
                <h3 class="text-lg font-bold mb-4">Event & Download</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="ev_title" placeholder="Judul Event" class="admin-input">
                    <input type="text" id="ev_link" placeholder="Link Download" class="admin-input">
                </div>
                <button onclick="addEvent()" class="w-full mt-4 bg-orange-600 hover:bg-orange-500 p-3 rounded-xl font-bold transition">PUBLISH EVENT</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
