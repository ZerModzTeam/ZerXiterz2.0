<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE - VVIP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="stars-wrapper" id="starField"></div>

    <header class="main-header">
        <button onclick="toggleSidebar()" class="burger-btn">
            <i class="fas fa-bars-staggered"></i>
        </button>
        <h1 class="logo">ZMT STORE</h1>
        <div id="admin_tag" class="admin-icon-tag hidden"><i class="fas fa-user-shield"></i></div>
        <div class="spacer"></div>
    </header>

    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-top">
                <span class="nav-label">NAVIGATOR</span>
                <i onclick="toggleSidebar()" class="fas fa-times close-icon"></i>
            </div>
            
            <nav class="nav-list">
                <button onclick="switchPage('home')" class="nav-item active">
                    <i class="fas fa-home"></i> <span>Toko Utama</span>
                </button>
                <button onclick="switchPage('event')" class="nav-item">
                    <i class="fas fa-bolt"></i> <span>Event Gratis</span>
                </button>
                <a href="https://wa.me/6289653938936" class="nav-item">
                    <i class="fab fa-whatsapp"></i> <span>CS Admin</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="lgn_btn" onclick="openAdmin()" class="auth-btn login-btn">LOGIN ADMIN</button>
                <button id="lgt_btn" onclick="logoutAdmin()" class="auth-btn logout-btn hidden">LOGOUT AKUN</button>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="qris-box">
            <div onclick="zoomQR()" class="qris-frame">
                <img src="qris_clean.png" alt="QRIS" class="qris-img">
            </div>
            <h2 class="qris-title">CLICK TO PAYMENT</h2>
            <p class="qris-sub">DIGITAL PAYMENT ZMT</p>
        </div>

        <button onclick="showRules()" class="rules-btn">
            <i class="fas fa-scroll"></i> RULES PAYMENT
        </button>

        <div id="page_home" class="product-feed"></div>
        <div id="page_event" class="hidden empty-state">BELUM ADA EVENT...</div>
    </main>

    <div id="modal_admin" class="modal">
        <div class="modal-card">
            <div class="modal-head">
                <span class="modal-title italic">ADMIN CONSOLE</span>
                <i onclick="closeAdmin()" class="fas fa-times"></i>
            </div>
            
            <div class="admin-form">
                <div class="input-row">
                    <input type="text" id="p_name" placeholder="Nama Produk" class="capsule-input">
                    <select id="p_tag" class="capsule-input">
                        <option value="ROOT/VIRTUAL">ROOT</option>
                        <option value="NO ROOT">NO ROOT</option>
                    </select>
                </div>

                <div id="price_fields">
                    <div class="input-row">
                        <input type="text" placeholder="Durasi" class="capsule-input d-in">
                        <input type="text" placeholder="Harga" class="capsule-input p-in">
                    </div>
                    <div class="input-row">
                        <input type="text" placeholder="Durasi" class="capsule-input d-in">
                        <input type="text" placeholder="Harga" class="capsule-input p-in">
                    </div>
                </div>

                <button onclick="saveP()" class="upload-btn">UPLOAD PRODUK</button>
                
                <div id="admin_list" class="manage-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
