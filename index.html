<!DOCTYPE html>

        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        .floating-text {
            position: absolute;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            animation: float 0.3s infinite alternate;
            text-shadow: 0 0 10px currentColor;
            z-index: 1;
        }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(40px, 40px) rotate(360deg); }
        }
        #main-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 50px cyan, 0 0 100px magenta, 0 0 150px yellow;
            animation: superblink 0.02s infinite;
            z-index: 9999;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 5px solid white;
            border-radius: 20px;
        }
        @keyframes superblink {
            0% { color: black; background: white; text-shadow: 0 0 80px red; }
            10% { color: red; background: cyan; text-shadow: 0 0 80px lime; }
            20% { color: yellow; background: blue; text-shadow: 0 0 80px magenta; }
            30% { color: lime; background: purple; text-shadow: 0 0 80px cyan; }
            40% { color: cyan; background: red; text-shadow: 0 0 80px yellow; }

            70% { color: black; background: yellow; text-shadow: 0 0 80px cyan; }
            80% { color: blue; background: magenta; text-shadow: 0 0 80px white; }
            90% { color: purple; background: lime; text-shadow: 0 0 80px yellow; }
            100% { color: black; background: white; text-shadow: 0 0 80px magenta; }
        }
    </style>
</head>
