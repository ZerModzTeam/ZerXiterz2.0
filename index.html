<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE - VVIP KAPSUL</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="stars-wrapper" id="starField"></div>

    <header class="navbar-top">
        <button onclick="toggleSidebar()" class="hamburger-btn">
            <i class="fas fa-bars-staggered text-blue-400 text-xl"></i>
        </button>
        <h1 class="logo-text">ZMT STORE</h1>
        <div id="admin_tag" class="hidden text-red-500 w-12 text-center animate-pulse">
            <i class="fas fa-user-shield text-xl"></i>
        </div>
        <div id="spacer" class="w-12"></div>
    </header>

    <div id="sidebar" class="sidebar-main">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <span class="nav-title">Menu Utama</span>
                <button onclick="toggleSidebar()"><i class="fas fa-times text-2xl text-gray-500"></i></button>
            </div>
            
            <nav class="nav-list">
                <button onclick="switchPage('home')" class="nav-item active"><i class="fas fa-home"></i> <span>Home</span></button>
                <button onclick="switchPage('event')" class="nav-item"><i class="fas fa-bolt text-yellow-500"></i> <span>Event</span></button>
                <a href="https://wa.me/6289653938936" class="nav-item"><i class="fab fa-whatsapp text-green-500"></i> <span>WhatsApp Admin</span></a>
            </nav>

            <div class="sidebar-footer">
                <button id="lgn_btn" onclick="openAdmin()" class="btn-admin-access login">LOGIN ADMIN</button>
                <button id="lgt_btn" onclick="logoutAdmin()" class="hidden btn-admin-access logout">LOGOUT</button>
            </div>
        </div>
    </div>

    <main class="content-area">
        <div class="qris-section">
            <div onclick="zoomQR()" class="qris-box">
                <img src="qris_clean.png" class="qris-img">
            </div>
            <p class="qris-hint">SCAN TO PAYMENT</p>
        </div>

        <button onclick="showRules()" class="btn-rules">
            <i class="fas fa-scroll mr-2"></i> Rules Payment
        </button>

        <div id="page_home" class="product-grid"></div>
        <div id="page_event" class="hidden empty-state">Belum ada event lek...</div>
    </main>

    <div id="modal_admin" class="modal-backdrop hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3>ADMIN PANEL</h3>
                <button onclick="closeAdmin()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="text" id="p_name" placeholder="Nama Produk" class="input-kapsul">
                <select id="p_tag" class="input-kapsul">
                    <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>
                <div class="grid-inputs">
                    <input type="text" id="p_day" placeholder="Durasi (Day)" class="input-kapsul">
                    <input type="text" id="p_price" placeholder="Harga (K)" class="input-kapsul">
                </div>
                <button onclick="saveP()" class="btn-save">UPLOAD PRODUK</button>
                <div id="admin_list" class="manage-list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
