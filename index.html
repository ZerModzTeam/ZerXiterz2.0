<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT EVENT v0.1.5 (BETA)</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* # (UI LAMA: NEBULA NEON KAPSUL) */
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            background-attachment: fixed; color: #e0e0e0; overflow-x: hidden;
        }
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1; pointer-events: none;
        }

        /* FITUR LAMA: HEADER KANAN ATAS */
        .header {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #00f2fe; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-titles { text-align: left; }
        .main-title { font-size: 22px; font-weight: 900; margin: 0; letter-spacing: 3px; color: #00f2fe; text-shadow: 0 0 10px #00f2fe; }
        .sub-title { font-size: 10px; color: #71ff00; margin: 0; letter-spacing: 1px; font-weight: 600; text-transform: uppercase; }
        
        .user-meta { text-align: right; }
        .usn-display { font-size: 13px; font-weight: 800; color: #00f2fe; margin-bottom: 4px; }
        .btn-logout { 
            background: linear-gradient(45deg, #ff0844, #ffb199); color: #fff; border: none; 
            padding: 5px 15px; border-radius: 20px; font-size: 10px; cursor: pointer; font-weight: bold;
        }

        .container { max-width: 480px; margin: 20px auto; padding: 0 15px; }
        
        /* FITUR LAMA: CARD KAPSUL DASHBOARD */
        .card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border-radius: 35px; border: 1px solid rgba(0, 242, 254, 0.2);
            padding: 22px; margin-bottom: 22px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* FITUR LAMA: INFO AKUN MENU */
        .account-info-menu { font-size: 12px; line-height: 2.2; }
        .info-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 6px 0; }
        .info-label { color: #00f2fe; font-weight: bold; }
        .status-on { color: #71ff00; font-weight: bold; }
        .status-off { color: #ff0844; font-weight: bold; }

        input, textarea {
            width: 100%; padding: 15px 22px; margin-bottom: 15px;
            border: 1px solid rgba(0, 242, 254, 0.4); border-radius: 30px;
            background: rgba(0, 0, 0, 0.5); color: #71ff00; outline: none; box-sizing: border-box; font-size: 13px;
        }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 30px;
            font-size: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .btn-primary { background: linear-gradient(45deg, #00f2fe, #4facfe); color: #000; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); }
        .btn-danger { background: linear-gradient(45deg, #ff0844, #ffb199); color: #fff; }

        .wheel-container { position: relative; width: 230px; height: 230px; margin: 0 auto 15px; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #00f2fe; transition: 7s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 20px; height: 32px; background: #71ff00; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 100; }

        .chat-box { height: 260px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 16px; border-radius: 20px; font-size: 13px; }
        .msg-me { background: rgba(0, 242, 254, 0.2); border: 1px solid #00f2fe; align-self: flex-end; }
        .msg-ot { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); align-self: flex-start; }
        .msg-bot { background: #71ff00; color: #000; align-self: center; text-align: center; width: 100%; font-weight: 900; }

        #pg-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #090a0f; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 320px; padding: 40px; background: rgba(255, 255, 255, 0.03); border-radius: 45px; border: 2px solid #00f2fe; text-align: center; box-shadow: 0 0 50px rgba(0, 242, 254, 0.3); }
    </style>
</head>
<body>

<div id="pg-login">
    <div class="login-card">
        <h1 class="main-title">ZMT EVENT</h1>
        <p class="sub-title">SILAHKAN DAFTAR</p>
        <div id="u-form" style="margin-top: 30px;">
            <input type="text" id="log-u" placeholder="USERNAME">
            <input type="password" id="log-p" placeholder="PASSWORD">
            <button class="btn btn-primary" onclick="auth('user')">LOGIN / REGISTER</button>
            <p onclick="setA(true)" style="color:#222; cursor:pointer; font-size:10px; margin-top:20px;">ADMIN ACCESS</p>
        </div>
        <div id="a-form" style="display:none; margin-top: 30px;">
            <input type="password" id="a-key" placeholder="ADMIN MASTER KEY">
            <button class="btn btn-danger" onclick="auth('admin')">BYPASS ADMIN</button>
            <p onclick="setA(false)" style="color:#222; cursor:pointer; font-size:10px; margin-top:20px;">BACK</p>
        </div>
        <p style="font-size:10px; color:rgba(255,255,255,0.2); margin-top:20px;">v0.1.5 (BETA)</p>
    </div>
</div>

<div id="pg-app" style="display:none;">
    <div class="header">
        <div class="header-titles">
            <h1 class="main-title">ZMT EVENT</h1>
            <p class="sub-title">SILAHKAN DAFTAR</p>
        </div>
        <div class="user-meta">
            <div class="usn-display" id="top-usn">USN: ---</div>
            <button class="btn-logout" onclick="location.reload()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="sub-title" style="margin-bottom:15px; color:#00f2fe;">📋 KETERANGAN AKUN</div>
            <div class="account-info-menu">
                <div class="info-row"><span class="info-label">User :</span> <span id="info-u">---</span></div>
                <div class="info-row"><span class="info-label">Pass :</span> <span id="info-p">---</span></div>
                <div class="info-row"><span class="info-label">Device login :</span> <span id="info-dev">0</span></div>
                <div class="info-row"><span class="info-label">Status :</span> <span id="info-stat">---</span></div>
                <div class="info-row"><span class="info-label">Login on :</span> <span id="info-time">---</span></div>
            </div>
        </div>

        <div id="ui-user" style="display:none;">
            <div class="card"><button id="btn-join" class="btn btn-primary" onclick="join()">AMBIL ANTRIAN</button></div>
            <div class="card" style="text-align:center;">
                <div class="wheel-container"><div class="pointer"></div><canvas id="cv-u" width="500" height="500"></canvas></div>
            </div>
            <div class="card">
                <div id="chat-u" class="chat-box"></div>
                <textarea id="msg-u" placeholder="Chat Global..."></textarea>
                <button class="btn btn-primary" onclick="send('global')">KIRIM PESAN</button>
            </div>
            <div id="box-win" class="card" style="display:none; border:2px solid #71ff00;">
                <div id="chat-p-u" class="chat-box"></div>
                <input type="file" id="f-u" onchange="up('user')">
                <textarea id="msg-p-u" placeholder="Klaim Data Hadiah..."></textarea>
                <button id="sb-u" class="btn btn-primary" onclick="send('private-u')">KIRIM KLAIM</button>
            </div>
        </div>

        <div id="ui-admin" style="display:none;">
            <div class="card">
                <button class="btn btn-primary" onclick="reg(true)">BUKA PENDAFTARAN</button>
                <button class="btn btn-danger" onclick="reg(false)" style="margin-top:10px;">TUTUP PENDAFTARAN</button>
            </div>
            <div class="card" style="text-align:center;">
                <div class="wheel-container"><div class="pointer"></div><canvas id="cv-a" width="500" height="500"></canvas></div>
                <button class="btn btn-primary" onclick="spin()">GAS SPIN</button>
            </div>
            <div class="card">
                <div id="chat-a" class="chat-box"></div>
                <textarea id="msg-a" placeholder="Admin Console (/ban usn)..."></textarea>
                <button class="btn btn-primary" onclick="send('global-a')">TRANSMIT</button>
            </div>
            <div class="card">
                <div id="win-tags" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;"></div>
                <div id="box-p-a" style="display:none;">
                    <b id="target-n" style="color:#00f2fe;"></b>
                    <div id="chat-p-a" class="chat-box"></div>
                    <input type="file" id="f-a" onchange="up('admin')">
                    <textarea id="msg-p-a"></textarea>
                    <button id="sb-a" class="btn btn-primary" onclick="send('private-a')">BALAS KLAIM</button>
                </div>
            </div>
            <button class="btn btn-danger" onclick="wipe()">☢️ RESET TOTAL DATABASE</button>
        </div>
    </div>
</div>

<audio id="s-spin" src="https://assets.mixkit.co/active_storage/sfx/2005/2005-preview.mp3"></audio>
<audio id="s-win" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, get, update, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.1.1/firebase-database.js";

    const cfg = { apiKey: "AIzaSyBnJAh3fFkohpM4XuVWg7HWUBUOa3dJkdI", authDomain: "spinanberhadiahzmt.firebaseapp.com", databaseURL: "https://spinanberhadiahzmt-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "spinanberhadiahzmt", appId: "1:655110191317:web:7e2272ae304dc4d53c4a5c" };
    const app = initializeApp(cfg); const db = getDatabase(app);

    let myU = "", myR = "", q = [], curT = "", imgB = null;

    window.setA = (v) => { document.getElementById('u-form').style.display = v ? 'none' : 'block'; document.getElementById('a-form').style.display = v ? 'block' : 'none'; };

    window.auth = async (role) => {
        if(role === 'admin') {
            if(document.getElementById('a-key').value === "zmtxxx") { myU="ADMIN"; myR="admin"; launch(); }
            else Swal.fire('Error', 'Master Key Salah!', 'error');
        } else {
            const u = document.getElementById('log-u').value.trim();
            const p = document.getElementById('log-p').value;
            if(!u || !p) return Swal.fire('Error', 'Username/Pass Kosong!', 'warning');
            
            const uRef = ref(db, `auth/users/${u}`);
            const snap = await get(uRef);
            const regS = await get(ref(db, 'config/regStatus'));
            const isOpen = regS.exists() ? regS.val() : true;

            if(snap.exists()) {
                if(snap.val().pw === p) { myU=u; myR="user"; launch(p); }
                else Swal.fire('Error', 'Password Salah!', 'error');
            } else {
                if(!isOpen) return Swal.fire('Closed', 'Pendaftaran Ditutup!', 'info');
                const now = new Date();
                const ts = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()} ${now.getHours()}:${now.getMinutes()}`;
                await set(uRef, {pw: p, loginOn: ts});
                myU=u; myR="user"; launch(p);
            }
        }
    };

    function launch(pass = "") {
        document.getElementById('pg-login').style.display='none';
        document.getElementById('pg-app').style.display='block';
        document.getElementById('top-usn').innerText = `USN: ${myU}`;
        
        if(myR==='admin') { 
            document.getElementById('ui-admin').style.display='block'; 
            initA(); 
        } else { 
            document.getElementById('ui-user').style.display='block'; 
            initU(); 
            document.getElementById('info-u').innerText = myU;
            document.getElementById('info-p').innerText = pass;
            handlePresence();
        }
    }

    function handlePresence() {
        const pRef = ref(db, `presence/${myU}`);
        const sRef = push(pRef);
        set(sRef, { state: 'online', ts: serverTimestamp() });
        onDisconnect(sRef).remove();

        onValue(pRef, (s) => {
            const count = s.exists() ? Object.keys(s.val()).length : 0;
            document.getElementById('info-dev').innerText = count;
            document.getElementById('info-stat').innerText = count > 0 ? "Online" : "Offline";
            document.getElementById('info-stat').className = count > 0 ? "status-on" : "status-off";
        });

        get(ref(db, `auth/users/${myU}/loginOn`)).then(s => {
            document.getElementById('info-time').innerText = s.val() || "---";
        });

        // DETEKSI BAN (KICK OUT)
        onValue(ref(db, `auth/users/${myU}`), (s) => {
            if(!s.exists()) { alert("DATA AKUN ANDA TELAH DIHAPUS ADMIN!"); location.reload(); }
        });
    }

    window.send = async (m) => {
        const isG = m.includes('global');
        const inpId = isG ? (myR==='admin'?'msg-a':'msg-u') : (myR==='admin'?'msg-p-a':'msg-p-u');
        const inp = document.getElementById(inpId);
        let txt = inp.value.trim();

        // FITUR BAN (HANYA GLOBAL)
        if(myR==='admin' && txt.startsWith('/ban ')) {
            const target = txt.split(' ')[1];
            if(target) {
                await remove(ref(db, `auth/users/${target}`));
                await remove(ref(db, `presence/${target}`));
                await remove(ref(db, `chats/private/${target}`));
                await push(ref(db, 'chats/global'), { s: 'SYSTEM', m: `@${target} TELAH DIBANNED & DATA DIHAPUS!`, type: 'bot' });
                inp.value = ""; return;
            }
        }

        if(!txt && !imgB) return;
        const path = isG ? 'chats/global' : `chats/private/${myR==='admin'?curT:myU}`;
        await push(ref(db, path), { s: myU, m: txt, f: imgB });
        inp.value = ""; imgB = null;
    };

    function listen(p, id) {
        onValue(ref(db, p), (s) => {
            const b = document.getElementById(id); b.innerHTML = "";
            s.forEach(c => {
                const d = c.val();
                let cls = d.type === 'bot' ? 'msg-bot' : (d.s === myU ? 'msg-me' : 'msg-ot');
                b.innerHTML += `<div class="msg ${cls}"><b>${d.s}:</b><br>${d.f ? `<img src="${d.f}" style="max-width:100%; border-radius:12px;"><br>` : ""}${d.m}</div>`;
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    window.up = (r) => {
        const file = document.getElementById(r==='admin'?'f-a':'f-u').files[0];
        const reader = new FileReader();
        reader.onload = (e) => { imgB = e.target.result; Swal.fire('Ready', 'Gambar siap dikirim!', 'success'); };
        reader.readAsDataURL(file);
    };

    window.spin = async () => {
        if(q.length < 2) return Swal.fire('Hoi', 'Min 2 orang!', 'warning');
        const wIdx = Math.floor(Math.random() * q.length);
        const win = q[wIdx];
        const rot = 3600 + (360 - (wIdx * (360/q.length))) - ((360/q.length)/2);
        await set(ref(db, 'config/sync'), { r: rot, w: win.u, d: false });
        setTimeout(async () => {
            await update(ref(db, 'config/sync'), { d: true });
            await push(ref(db, 'wins'), { u: win.u });
            await push(ref(db, 'chats/global'), { s: 'BOT', m: `🎉 @${win.u} MENANG!`, type: 'bot' });
            await remove(ref(db, `queue/${win.k}`));
        }, 7200);
    };

    function draw(id, list) {
        const c = document.getElementById(id); if(!c) return;
        const ctx = c.getContext('2d'); const n = list.length || 1; const a = (2*Math.PI)/n;
        ctx.clearRect(0,0,500,500);
        list.forEach((p, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2===0 ? '#001529' : '#002140'; ctx.strokeStyle = '#00f2fe';
            ctx.moveTo(250,250); ctx.arc(250,250,240,i*a,(i+1)*a); ctx.fill(); ctx.stroke();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*a + a/2);
            ctx.fillStyle = "#00f2fe"; ctx.font = "bold 18px Arial"; ctx.textAlign="right";
            ctx.fillText(p.u, 230, 8); ctx.restore();
        });
    }

    function initA() {
        listen('chats/global', 'chat-a');
        onValue(ref(db, 'queue'), (s) => { q=[]; s.forEach(c => { q.push({u:c.val().u, k:c.key}); }); draw('cv-a', q); });
        onValue(ref(db, 'wins'), (s) => {
            const l = document.getElementById('win-tags'); l.innerHTML = "";
            s.forEach(c => { const n = c.val().u; l.innerHTML += `<button class="btn btn-primary" style="width:auto; padding:5px 12px; margin:2px;" onclick="openP('${n}')">@${n}</button>`; });
        });
    }

    function initU() {
        listen('chats/global', 'chat-u');
        onValue(ref(db, 'queue'), (s) => {
            let l=[]; let j=false;
            s.forEach(c => { l.push({u:c.val().u}); if(c.val().u===myU) j=true; });
            if(j) { document.getElementById('btn-join').disabled=true; document.getElementById('btn-join').innerText="TERDAFTAR"; }
            draw('cv-u', l);
        });
        onValue(ref(db, 'config/sync'), (s) => {
            const d = s.val(); if(!d) return;
            document.getElementById('cv-u').style.transform = `rotate(${d.r - 90}deg)`;
            if(d.r > 0 && !d.d) document.getElementById('s-spin').play();
            if(d.d && d.w === myU) { confetti(); document.getElementById('s-win').play(); Swal.fire('JACKPOT!', 'Klaim di menu bawah!', 'success'); }
        });
        onValue(ref(db, 'wins'), (s) => {
            let w=false; s.forEach(c => { if(c.val().u===myU) w=true; });
            document.getElementById('box-win').style.display = w ? 'block' : 'none';
            if(w) listen(`chats/private/${myU}`, 'chat-p-u');
        });
    }

    window.openP = (u) => { curT=u; document.getElementById('box-p-a').style.display='block'; document.getElementById('target-n').innerText="REPLY: @"+u; listen(`chats/private/${u}`, 'chat-p-a'); };
    window.reg = (v) => set(ref(db, 'config/regStatus'), v);
    window.join = () => push(ref(db, 'queue'), {u: myU});
    window.wipe = async () => { if(confirm("RESET DATABASE?")) { await remove(ref(db, '/')); location.reload(); } };
</script>
</body>
</html>
