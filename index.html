<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZMT STORE - OFFICIAL</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#05070a] text-white overflow-x-hidden">

    <header class="fixed top-0 w-full z-[100] bg-[#05070a]/90 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <button onclick="toggleSidebar()" class="w-12 h-12 flex items-center justify-center bg-blue-500/10 rounded-full border border-blue-500/20 active:scale-90 transition-all">
            <i class="fas fa-bars-staggered text-blue-400 text-xl"></i>
        </button>
        <h1 class="text-xl font-black italic tracking-tighter text-blue-500 uppercase">ZMT STORE</h1>
        <div id="admin_indicator" class="hidden w-12 h-12 flex items-center justify-center"><i class="fas fa-user-shield text-red-500 text-xl"></i></div>
        <div id="spacer" class="w-12"></div>
    </header>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-[#080b12] z-[1000] transform -translate-x-full transition-transform duration-500 border-r border-white/5 shadow-2xl">
        <div class="p-8 flex flex-col h-full">
            <div class="flex justify-between items-center mb-10">
                <span class="text-blue-500 font-black italic uppercase tracking-widest">Navigator</span>
                <button onclick="toggleSidebar()"><i class="fas fa-times text-2xl text-gray-400"></i></button>
            </div>
            
            <nav class="flex flex-col space-y-3">
                <button onclick="switchPage('home')" class="nav-btn active"><i class="fas fa-home"></i> <span>Toko Utama</span></button>
                <button onclick="switchPage('event')" class="nav-btn"><i class="fas fa-bolt text-yellow-500"></i> <span>Event Gratis</span></button>
                <a href="https://wa.me/6289653938936" target="_blank" class="nav-btn"><i class="fab fa-whatsapp text-green-500"></i> <span>Customer Service</span></a>
            </nav>

            <div class="mt-auto space-y-2 border-t border-white/5 pt-6">
                <button id="btn_login" onclick="openAdmin()" class="w-full p-4 bg-blue-600/10 border border-blue-500/20 rounded-full text-blue-500 font-bold active:scale-95 transition-all text-[10px] uppercase tracking-widest">Login Admin</button>
                <button id="btn_logout" onclick="logoutAdmin()" class="hidden w-full p-4 bg-red-600/10 border border-red-500/20 rounded-full text-red-500 font-bold active:scale-95 transition-all text-[10px] uppercase tracking-widest">Logout Akun</button>
            </div>
        </div>
    </div>

    <main class="pt-28 pb-24 px-6 max-w-md mx-auto">
        <div class="text-center mb-6">
            <div onclick="zoomQR()" class="inline-block p-2 bg-white rounded-[2.5rem] shadow-2xl cursor-pointer active:scale-95 transition-all">
                <img src="qris_clean.png" alt="QRIS" class="w-44 h-44 object-contain rounded-3xl">
            </div>
            <p class="text-[10px] font-black text-blue-500 mt-4 tracking-[0.3em] uppercase italic">CLICK TO PAYMENT</p>
        </div>

        <button onclick="showRules()" class="w-full py-3.5 mb-10 bg-red-600/10 border border-red-500/20 rounded-full text-red-500 font-black text-[10px] tracking-widest uppercase active:scale-95 transition-all">
            <i class="fas fa-scroll mr-2"></i> Rules Payment (Wajib Baca)
        </button>

        <div id="page_home" class="space-y-6"></div>
        <div id="page_event" class="hidden space-y-4"></div>
    </main>

    <div id="modal_admin" class="fixed inset-0 bg-black/95 z-[2000] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#0f172a] w-full max-w-sm rounded-[3rem] p-8 border border-blue-500/20 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black text-blue-500 uppercase italic">Admin Panel</h2>
                <button onclick="closeAdmin()"><i class="fas fa-times text-2xl text-gray-500"></i></button>
            </div>

            <div class="flex gap-2 mb-6 bg-black/40 p-1.5 rounded-full border border-white/5">
                <button onclick="tabAdmin('tab_p')" id="btn_tab_p" class="flex-1 py-3 text-[10px] font-black rounded-full bg-blue-600 uppercase">Input</button>
                <button onclick="tabAdmin('tab_manage')" id="btn_tab_manage" class="flex-1 py-3 text-[10px] font-black rounded-full uppercase">List</button>
                <button onclick="tabAdmin('tab_e')" id="btn_tab_e" class="flex-1 py-3 text-[10px] font-black rounded-full uppercase">Event</button>
            </div>

            <div id="tab_p" class="space-y-3">
                <input type="hidden" id="edit_id">
                <input type="text" id="p_name" placeholder="Nama Produk" class="kapsul-in">
                <select id="p_tag" class="kapsul-in">
                    <option value="ROOT/VIRTUAL">ROOT/VIRTUAL</option>
                    <option value="NO ROOT">NO ROOT</option>
                </select>
                <div class="grid grid-cols-2 gap-2" id="price_area">
                    <input type="text" placeholder="Day (Angka)" class="row-in d-in"> <input type="text" placeholder="Harga (K)" class="row-in p-in">
                    <input type="text" placeholder="Day (Angka)" class="row-in d-in"> <input type="text" placeholder="Harga (K)" class="row-in p-in">
                    <input type="text" placeholder="Day (Angka)" class="row-in d-in"> <input type="text" placeholder="Harga (K)" class="row-in p-in">
                </div>
                <button onclick="saveP()" id="save_btn" class="w-full bg-blue-600 py-4 rounded-full font-black uppercase mt-4 active:scale-95 transition-all">Upload Produk</button>
            </div>

            <div id="tab_manage" class="hidden space-y-2" id="admin_list_produk">
                </div>

            <div id="tab_e" class="hidden space-y-4">
                <input type="text" id="e_title" placeholder="Nama Event" class="kapsul-in">
                <input type="text" id="e_link" placeholder="Link Download" class="kapsul-in">
                <button onclick="saveE()" class="w-full bg-purple-600 py-4 rounded-full font-black uppercase">Tambah Event</button>
            </div>
        </div>
    </div>

    <div id="modal_qr" onclick="this.classList.add('hidden')" class="fixed inset-0 bg-black/95 z-[3000] hidden flex items-center justify-center p-6">
        <img src="qris_clean.png" class="max-w-full max-h-[85vh] rounded-[2.5rem] border-4 border-white/10 shadow-2xl">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
